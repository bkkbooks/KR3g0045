body:
  text: 太清神鑑卷四形類論形神二氣未判則一體冥寂天地既形則萬物成體物之有體也則其性人之有形也則其神形神相順以成道相資以成徳故人之生也有形斯有神有神斯有道神須形而始安形須神而始運葢形能養血血能養氣氣能養神是以形全則血全血全則氣全氣全則神全兩者不可不備其或神形有餘則為有福之兆或形神欠虧乃為禍之基故神足於形為貴形過神者為賤乍可神足而形不足不可形足而神不足也論形夫人之生也禀隂陽冲和之氣肖天地之形受五行中正之質為萬物之靈故頭圓像天足方像地眼目像日月聲音像雷霆血脉像江河骨節像金石鼻額像山嶽毛髪像草木天欲髙而圓地欲方而厚日月欲光明雷霆欲震響江河欲流暢金石欲堅山嶽欲峻草木欲秀故形也有隂陽剛柔之義有五形正類之體其男子也剛正雄畧乃得陽之宜也女人也柔順和媚乃得隂之宜也其形分於五行者木形長瘦金形方正水形肥而圓土形重而厚火形赤而上尖形正而不䧟乃五形正氣其或水火相傷金木相犯皆為不合之相也多招災禍之凶其形龍翔海嶽鳯戯丹墀獅坐龜逰虎踞馬躍攀猿舞鶴罒牛浮鴈此皆天地之純粹間世之英才也故漢髙祖有龍顔之瑞玉管云卜商有堂堂之貎唐太宗天日之表班超則燕頷虎頭黄琬鳳睛龜背富貴之兆故皆顯著其寒如瘦鷺視似羊睛蛇行雀走犬暴豹聲斯皆貧賤之形發也其理浩博非一言可盡辯也宜精思以詳之茍無其類則吉凶無騐矣故郭林宗觀人有八法一曰威為尊嚴畏憚也如豪鷹搏物而百鳥自驚似怒虎投林而百獸自懼葢神色嚴嚴而人所畏則主權勢也二曰厚為風貎敦重也其量如滄海器如百斛引之不來摇之不動則主福禄也三曰清謂精神翹秀也如桂林一枝崑山片玉灑然髙秀而無塵翳俊才貴也或清而不厚近乎薄也四曰古謂骨氣巖稜也其或部位相應則為髙貴之人或濁而不清近乎俗也五曰孤謂形骨露也其項長肩縮脚斜腦偏其坐如摇其形如攫又似水中獨鶴雨中鷺鷥則孤獨也六曰薄謂體貎劣弱其形氣輕怯也色昏不明神露不藏如一葉之舟而在重波之上見之者皆知其㣲薄則主貧寒也縱有衣食必夭折矣七曰惡謂體貎凶頑蛇䑕之形豺狼之聲或性躁神驚骨傷帶破主凶惡也八曰俗謂形貎昏濁也如塵埃之中物縱有衣食主迍滯也名賢相法五總龜八形與前觀人八法同大抵受氣有清濁成形有貴賤故豐厚謹嚴者不富則貴淺薄輕躁不貧則夭女人之氣欲其和媚形欲嚴謹言欲柔而不暴緩而不廹行坐欲端而不側視欲正而不流則大貴也五形人禀天地之氣而有五行之類也故木形者聳而瘦挺而直長而露節頭隆而額聳也或肉重而肥腰偏而背薄非木之善金形者小而堅方而正形短不為之不足肉堅不為之有餘也水形短而浮闊而厚則俯然而流也土形者敦而厚重而實背隆腰厚其形似龜也火形者上尖而下闊上輕而下重性躁急而炎炎也故五形欲得相生無尅如木形之人木之聲髙而喨其性仁而静相之善也其或五形相尅聲音相反為刑重災禍之人也玉管照神局同論㸔形神體像凡㸔形神須類物性行飛騰躍宛有所一後㸔氣衰旺五嶽四瀆朝對如何雖有好形神而五位無出彩者此人應事歇滅而如初也形神雖不足五嶽雖不應而有長旺色者衣食自然凡㸔形神須察氣色㸔之則萬無失一也論形不足形之不足者頭頂尖薄肩膞狹斜腰肋疎細肢節短促掌薄指疎唇褰額塌鼻抵耳反臀低胷䧟一眉曲一眉直一眼仰一眼低一睛大一睛小一顴髙一顴低一手有紋一手無紋睡中開眼男子女聲齒黄而露口臭而尖秃頂無髪眼深不見行走欹斜顔色痿怯頭小而身大上短而下長此謂之形不足也多疾而短命福薄而貧賤矣論形有餘形之有餘者頭頂圓厚腹背豐隆額闊口方唇紅齒白耳圓成珠鼻直如膽眼分黒白眉秀踈長肩膊齊厚胷前平廣腹圓垂下出語宏亮行坐端正五嶽相起三停相稱肉膩骨細手長足方望之巍巍然而來仰之怡怡然而坐此皆謂形有餘也形有餘者令人長夀少病富而有榮矣鶴形者三才相等眼細眉長鼻尖而小身長垂口身體上下一般細長而正地閣小五官俱好正鶴形也或行緩者單鶴形也面部有雜鼻大口小或口大凖起者孤鶴形也五色不分神氣不足病鶴形也正鶴形正鶴形神大貴人生來衣食不曽貧命居三館公卿位夀筭仍須過百春單鶴形單鶴形神藝出羣生來聰俊過常人貴當富顯馳千里財帛猶豐不受貧孤鶴形孤鶴形神惡毒人妨兒尅子只孤身妻兒生别生離去老至湏教獨受貧病鶴形病鶴形人命不長生來破敗少田庄中年定受貧寒苦無子無孫走路傍鳯形者額長三停平滿耳輪貼肉山根髙聳凖頭圓潤眼長而尾起口如蓮眉粗而秀倉庫五官六府俱好正鳯形也其或眉大眼大下短或身側小鳯形也身長聳其精神緩急者丹鳯形也如額低精神慢眉長不應是病鳯形也正鳯形正鳯形髙貴且强生居九鼎出朝堂一生聰智多文學大國為臣小國王小鳯形小鳯形神福禄强生來富貴不尋常中年顯達官榮盛大業洪勲逺播揚丹鳯形丹鳯聰明清貴人生來榮貴且超羣定居三品公卿位祗是難為兄弟身病鳯形病鳯形神雖性靈聰明文學有聲名都縁難得官班位縱得官班却見迍龜形者頭圓項短身大背厚眼細口大而闊𤣥璧朝接山根髙起龜形也其或精神亂過者出水龜形也或諸部位有不應然而精神美恱者戯龜形也五色不分諸位不應而多厚黑精神足者藏龜形也正龜形正龜形神夀年多生居兩輔衆難過初年名逺揚千里後者榮華萬國歌出水龜形出水龜形乆必榮生來聰敏起名聲夀雖七十身孤獨兄弟妻兒定不成戯龜形戯龜形人文藝多只宜晚禄供山河中年雖得荷依掛末嵗須防給諫過藏龜形藏龜形人衣食榮初依父母有空名年老難免饑寒苦獨力孤形少弟兄犀形者頭四方印堂闊地閣厚重眼圓眉大薄五嶽正天庭起行歩重而闊五官六府俱好正犀形也面部同而歩急速手腰背動舉者出水犀形也面部五官六府有破不舉短促是入水犀形也面雖部位一同而五官不正身長側者戯犀形也正犀形正犀形神是貴人職居館殿足金銀夀年八十人皆敬百世榮華及子孫出水犀形出水犀形是正郎晚年髙職坐朝堂金珠錢寳家盈萬夀筭應當七十亡入水犀形入水犀形食禄多出羣英俊衆難過夀年七十荘田盛一世榮華争奈何戯犀形戯犀形神藝出羣生來卓立不求人錦衣玉食誰能及更夀年髙六十春虎形者頭圓項短地閣重厚九州團促眉濃口大面闊鼻大五官六府俱好正虎形也行走急速腰身正視不定此入林虎形也面部雖同精神帶慢顧視偏斜者此落坑虎形也正虎形正虎形人是大僚文操武畧富偏饒生來便有三公位老後須登駟馬驕出林虎形出林虎形性正剛生來聰知足文章初年榮達髙官職位入星郎耀四方入林虎形入林虎形是正郎名傳聲價最髙强只縁心志多藏毒暗恐消磨夀不長落坑虎形落坑虎形不可親毒忿生來愛䧟人錦帛資財雖積畜争知夀不過多春獅子形者額方眉大口闊鼻大耳大眼大身肥天地相應三才平滿倉庫厚𤣥璧起五官六府俱好正獅子形也若或面部雖同身小眼部不應小獅子形也行慢身重多精神者坐獅子形也若行歩踟蹰瞻視不正精神美悦者戯獅子形也正獅子形正獅子形額正方眉濃眼大口須長九州髙聳耳朝口出世須教作郡王小獅子形小獅子形主晚榮生來榮顯負清名錦帛錢財成巨萬自宜營運保前程坐獅子形坐獅子形是貴人生來衣食足金銀清資定入公卿位夀筭仍須八十春戯獅子形戯獅子形衣食足位歸侯相鎮山河玉寳珠金多積畜一生快樂任婆娑龍形者五嶽起三才平滿天地相朝鳯節豐濃印堂起方寸邊地起人門闊眉分八彩目長二寸耳長四寸五官六府俱好者正龍形也男即大貴之相女即妃后之貴也若有五色者定五龍之形也别述青黄赤白黒五品相儻或行歩不同面部有雜一處不應即是卧龍形也即主多禄之位或帶虎頭燕頷即是山龍形也主將軍節度之權面上二停身一停此主侯伯之位面上一停身占二停此主將帥之職也正龍形正龍天下貴無雙上天儀表萬邦王一流河水須鎮斷四夷歸貢走梯航卧龍形卧龍合主三台位闡世文章天下名官爵定須居一品及第人皆震一鳴山龍形山龍本是將軍位文武俱全鎮廟堂三代侯門生貴子出為兵帥入為王五短之形一頭短二靣短三身短四手短五足短五者俱短骨細肉滑印堂明潤五嶽朝接者少卿公侯之相也雖俱五短而骨麄惡五嶽缺䧟則為下賤之人也其或上長下短則多富貴上短下長主居貧下矣五長之形一頭長二面長三身長四手長五足長五者俱長而骨貎豐隆清秀滋潤者善如骨肉枯槁筋脉迸露雖俱五長反為貧賤之輩也或有手短足長者主貧而賤足短手長者主富而貴也論聲人之性動於心而形於聲故聲者氣實藏之氣搆衆虚而成響内以傳意外以應物念有聲猶鍾鼔之響若大則聲宏若小則聲短神清氣和則聲温潤而圓暢也神濁氣促則聲焦急而輕嘶也玉管照神音西噎也又馬鳴也故貴人之聲出於丹田之内與心氣相通汪洋而外達何則丹田者聲之根也心氣者聲之端也舌端者聲之表也夫根深則表重根淺則表輕玉管照神云是知聲發於根而見夫表也若夫清而圓堅而亮緩而烈急而和長而有力有威若音大如洪鍾發響鼉鼔震響音小似寒泉飛韻琴徽奏曲接其語則粹然而後動與之言則悠然而後應是以聲之善者逺而不斷淺而能清深而能藏大而不濁小而能新細而不亂出而能明餘響激烈笙簧宛轉流行能圓能方如斯之相並主福禄長年若夫小人之聲發於舌端喘急促而不逺不離唇上紊雜而斷續急而又嘶緩而又澁深而帶滯淺而帶躁或大而散或長而破或輕而不匀或繚繞而無節或槎崖而暴或煩亂而浮麄濁飛散蹇淺訥澁或如破鍾之響敗鼓之聲或如寒雞哺雛餓鴨哽肉或似病猿求侣或似孤鴈失羣細如秋蚓發吟大似寒蟬晚噪雄者如犬暴吠雌者似羊孤鳴如斯之聲皆為淺薄也或男作女聲細者一世孤窮玉管照神局註云謂其柔細而不剛烈也女作男聲暴者主一世妨害玉管照神局註曰謂其剛暴而不和也然則身小而音大者吉身大而音小者㐫身聲相稱者善或乾濕不齊者謂之羅網聲或小或大者謂之雌雄聲或先遲而後急或先急而後遲或聲未止而氣絶或聲未舉而色先變皆薄淺之相也是以神定於内而氣和於外則聲安而言有先後之序乃無變色也茍神不安必氣不和則其言先後失序醉色雜錯皆是小人薄劣之相也且聲如破筒者富破瓦者賤破木者貧破竹者苦公鵞聲者多破散公鴨聲者多賤徒暴如豺狼者毒害多汪聲深堂者為福人故聲細如啼貧賤孤恓聲粗如哭災禍相逐聲音明快意象逺大聲音嫩嬌家活氷消人之稟五行之形其聲亦有五行之象故木音髙暢玉管照神局註曰嘹喨髙暢激越而和火音焦烈玉管照神局註云發之大嚴如火之烈其或噪戾淺暴者謂之火濁不善之應也金音和潤玉管照神局註曰和則不戾潤則不枯叩之為清擊之為純又如桐篁奏曲玉磬流音也水音圓急玉管照神局註曰圓而清急而暢堅而不散長而有力或條達而流或鏘洋而奮土音沉厚沉則不淺厚則不薄洋然發在嚥喉之間也若與形相生則吉相尅則㐫為聲者分三主可决成敗耳初聲髙者初主强中聲薄者中主强後聲㣲者晚年卑是以聲音主發閉之人不可不善不善者並為凶惡必多灾難刑厄有官則多失位有財則破散男則不能保其室女則不能保其家矣玉管照神局并月波洞中記凡聲最難辨大抵舌頭圓全清潤響快不宜焦急沉滯刑破短促若人大而聲小者非逺器也人小而聲大者良器也又須於五行形神辯論聼五聲合與不合刑與不刑斷制不可言論也畧具五聲訣于後金聲韻長清響逺聞金圓潤則貴金破則賤土聲韻重響亮逺聞重則貴近薄則賤也火聲清烈調暢不懦完潤而慢則貴焦破則貧賤木聲韻條達初全終散沉重則貴如輕則賤也水聲韻清細響急長細則貴如輕則賤也論五聲又不以形類葢為聲無形但聼而㑹意則詳酌其理然後較其吉㓙萬不失一也五音五行散為萬物人生萬物之上而聲亦辨其故木音嘹嚦髙暢激越而和火音焦裂躁怒如火烈烈金音和而不戾潤而不枯玉磬流音水音圓而清急而暢或條逹而流或激而奮土音深而不淺厚而不薄渾然如發在咽喉之間也與形相養相生者吉與形相尅相犯者㐫行部行者進退之節去就之義所以見其貴賤之分也人之善行如舟之遇水無所徃而不利也不善行者猶舟之失水必有漂泊没溺之患也是以貴人之行如水而流下身重而脚輕玉管照神局註曰身端直如水之流下俯然而徃體不摇也小人之行如火炎上身輕而脚重玉管照神局註曰如火摇動其身不正其脚摇而動故行不欲昻首而躩又不欲側身而折太髙則亢太卑則曲太急則暴太緩則遲周旋不失其節進退各中其度者至貴人也且行而頭低者多智慮行而頭昻者少情義行而偃胷者愚而下行而身平者福而吉如虎歩者福禄如龍奔者權貴如鵞鴨之歩者家累千金如馬鹿之驟者奔波如牛行者富而夀如蛇行者毒而夭雀跳者食不足猿躑者苦不停龜行者福夀鶴歩者天禄鴈行者聰明而賢䑕行者疑而賤行如流舟者富貴行如急火者㣲賤蹭蹬而來者性行不吉泄泄而徃者財食有餘脚根不至地窮而夭夀發行急如奔走者賤居人下行而左右偷視者心懷望竊行而囬面後顧者情多驚亂大體行之貴也腰不欲折頭不欲低發足欲急進身欲直起走欲闊端而徃不凝滯者貴相也行者進退去就之間欲中規矩不反徐動有理者善也故肥人形重行欲如飛瘦人形輕行欲如疑此乃貴相若斜身偏肩如鵲之跳如蛇之趍者皆非善也坐所以安止欲沉静平正身不斜不側深重盤石腰背如有所助終日不倦神色愈清者貴相若如醉如病如有所思者皆不善相也人云人之行者屬陽坐者屬隂故行者體陽為動坐者像隂為静凝然不動者坐之徳也坐而膝摇者薄劣之人也坐而頭低者貧苦之輩也坐而轉身囬面者毒坐而摇頭擺腦者狡公然如石不動者富貴恍然如猿不定者貧賤坐定神氣不轉者忠良福禄坐定亂色變容者凶惡愚賤坐之為道不端不正其相不令能謹能嚴其福日添也卧者體息之期也欲得安而静恬然不動者福夀之人也如狗之蟠者上相如龍曲者貴人睡而開口者短命夢中咬牙者兵死睡開眼者惡死道路睡中囈語者賤中奴婢仰形如屍者貧苦短命卧中氣麄如吼者愚濁易死合面覆卧者餓死就床便困者頑賤愛側睡者吉慶夀多展轉者性亂少睡者神清而貴多睡者神濁而賤卧易覺者聰敏卧難醒者愚頑喘息不聞者髙夀喘息潤匀者命長氣入多夀氣少短命氣出嘘嘘之聲者即死䘮夫睡卧輕摇未常安席者下相也氣血資之以壯性命繫之以存者飲食也故食物不欲語嚼物不欲怒食急者易肥食遲者多疾食少而肥者性寛食多而痩者性亂飲緩者性和食如啄者貧歛口食者淳和哆口食者不義食而齒出者貧苦短命嚼似牛者福禄食如羊者尊榮食如虎者將帥之權食如猿者使者之位邊食邊顧終身窮饑食快而不留詳而不暴嚼不欲聲吞不欲鳴矣餘與五總龜同
