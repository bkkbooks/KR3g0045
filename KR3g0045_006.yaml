body:
  text: 太清神鑑卷六黑痣部夫黑痣者若山之生林木地之出堆阜山有美質則生善木以顯其秀地積汚土則長惡阜以文其濁是以萬物之理無所不然故人之有美質也則生竒痣以新其貴生有濁質則生惡痣以表其賤故漢高祖左股有七十二黑子則見帝王之瑞相也凡黑痣生於顯處者多凶生於隱處之中者多吉故生靣上者皆不利也黑痣其色黑如墨赤如硃善也帶赤色者主口舌鬪競帶白色者主憂刑帶黃色者主遺忘失脫此文理之辨相也頭靣黑痣生髮中者主富壽近上者尤猛貴額上有七星黑者主大貴天中主妨父天庭主妨母司空妨父母印堂心主貴兩耳輪上主富耳內主壽頤上主財眼胲上主作賊山根上主尅害山根下主兵死鼻側主病苦死目上窮困多眉中主富貴唇上主吉利鼻頭主妨害刀厄鼻梁主蹇滯人中主求婦易口側聚財難口中主酒食舌上主虛言唇下主破財口角主失職承漿主醉死左廂主橫死高廣二親妨尅陽尺主客死輔角主兵死邉地主外死轉角主貧下山林主蟲傷虎角主軍門劫門主弓箭死青路主客道死太陽主大婦吉魚尾主井亡姦門主刀殺天井主水厄𤣥中主清慎夫坐主喪妻長男主尅長子中男主尅中兒次男主尅次兒金匱主破散書上主無職學堂主無學命門主火厄僕使主為賤嬰門主饑寒小吏主貧薄中堂主尅妻外宅主無屋奴婢主妨奴坑塹主落崖陂池主溺水匱上主客亡三陽主縊死盜部主奸竊兩厨主乏食祖宅主移屋大海主水厄年上主貧困地閣主少田宅牢獄主刑厄之災也手足黑痣兩肘內近上謂之厄門主病厄兩肘近下謂原缺壁主富貴兩肘後主富財兩肘頭主灾厄兩臂肘屈交中謂之後收近腕謂之前收主伎巧兩肘外謂之城社主貴兩腋下謂之金匱主富兩腋畔謂之絲堂主蠶桑兩曲池穴外謂之神亭主邪妄曲池穴裏大骨上謂之盜部主被盜兩臂外謂之厄門主刀傷兩掌中主富貴兩手皆主才巧兩腿之上謂之福府主驅使奴婢兩腿後謂之得庭主福德旺相兩曲膝後謂之財苑主牛馬六畜兩胯骨上下謂之有威勢兩膝上謂之玉府主蓄財帛兩膁刃骨上謂之勞源主奔波勞苦兩腳底謂之寶藏主封侯伯足指間謂之外庫主多僕相也身體上下黑痣兩乳上謂之左右倉主積財穀兩乳中謂之男女宫主宜男女兩乳下謂之左右庫主積金帛兩乳間當心者謂之福苑主壽而樂臍中謂之龍關主福智生貴子臍下兩傍謂之左荒右野主貴而樂腹橫紋兩傍謂之逸堂主性間雅富貴快樂咽喉下近上者謂之天柱主得人提擕近下者主傷死項上謂之勢源主有威權之吉腦後骨上謂之壽堂主多壽考腰當中心謂之四大海主守官邊庭不返而死兩臂辨者主有財穀男兒貴格眼勢入天倉眉清復更長凖圓年壽起法令貫頤堂兩眉過耳聳唇丹口四方承漿朝地角色正見神光起背如披甲眉清額又方官髙名四海萬古播忠良又云眉為華蓋眼為星華蓋高兮眼貴明地勢朝天乘步穩必當年少作公卿兩府格額廣而平天庭不陷鼻隆而直地濶不尖瘦人有肩背肥人神愈清邊廣地廣龍骨與虎骨相成肉光滑眉秀輕凖完滿蘭臺廷尉分明耳貼肉而生分明為五嶽朝正口傍有肉起不論肥瘦天倉不陷骨隆而肉稱色正而光聲不論大小清圓不破肩隆有背有胸上長下短手足龍虎相吞目不論大小神藏不露眼囊大而藏睛神而不亂厚而不俗坐穩行輕此乃兩府格也兩制格瘦人額廣肥人額平色正肉滑髮細鬢清目藏神而逺天倉不陷鼻隆而直地角不尖瘦人肩背厚肥人神愈清邉廣地廣龍骨與虎骨相成君臣相稱耳聳金匱平眉輕清秀色正而明正郎格瘦人色正肥人不俗精神隱藏鼻直口方肩背豐隆瘦人肩背不寒肥人骨肉相稱舉止自重員郎格靣目神藏而逺額方骨聳金匱方平瘦人肩背不寒肥人骨肉相稱舉止貴氣自重男豪富耳聳大兼長眉疏口四方背隆如負物胸起似昂藏鼻直兼圓凖色老輔神光三陽成不陷顴骨插天倉手足如綿軟雙縧夀帶長不唯身主富更定子孫昌長夀祿耳聳勢兼長眉清口四方額方分日月眼不露神光鼻直兼圓凖頤方法令長腦圓成玉枕地閣輔承漿牛項兼觀目肩隆井竈藏骨剛過上夀清德夀無疆夭壽眉促又相連唇輕額又尖鼻低橫有骨頭細却無肩眼露還無壽形寒不老年額虧邉地窄輪返耳朝前色嫩兼生火聲焦命豈延眼光浮泛露三十入黃泉先賤後貴額小初年滯神清色且牢氣寒神自逺勢怯却威髙廣顙終成器頤完祿位髙色黃雖未發五嶽已相朝莫道多迍滯逢時自發苖不唯官祿位財帛自相招先富後貧額廣榮初主神清色不牢鼻髙無臉骨肉薄却聲焦掌厚還筋露臍深耳不朝背雖如負物胸薄不生毫色嫩初主好中年禍必招君看今已富終主自蕭條四相不露眼睛露黑白分明不為露鼻露竅山根正不為露口露齒唇不褰不為露耳反輪貼肉生不為露又云一露二露有裩無袴露齒結喉身不自由鷺鷥類鶴終是不足更看骨法形氣决之餘與前同三停上停長者大吉昌中停長者近君王下停長者皆庸俗逺走他方主不良又云身三停相稱及上下勻稠則為富貴之人也上長下短背聳三山則為公卿之位上短下長腰身怯薄一生奔走貧苦之輩矣五大五大之形一頭大二眼大三腹大四耳大五口大五大者須得生成無缺陷則主富貴矣或頭大而無角眼大而昏濁腹大而不圓垂耳大而無輪廓口大而唇薄則反主貧賤也八大八大者眼雖大昏且濁鼻雖大梁柱弱口雖大兩垂角耳雖大門孔薄頭雖大無骨著聲雖大宫商虧靣雖大薄却皮身雖大停不齊已上八者如不相應者反為貧賤人也五小五小之形一頭小二眼小三腹小四耳小五口小若五者端正無缺陷而俱小者乃貴相也其或三四小而一二大者則主應貧賤若夫頭小而有角眼小而清秀腹小而圓垂耳小而輪廓成口小而唇齒正則反貴人也八小眼雖小秀且長鼻雖小梁柱直口雖小稜且方耳雖小堅且圓頦雖小平且正聲雖小宫且商靣雖小清且朗身雖小正且齊已上八者有如相應端美者反為富貴之人也六賤六賤者額角缺陷天中薄下為一賤背胸俱薄為二賤音聲雌散為三賤耳目斜視為四賤鼻曲低塌為五賤目無光彩為六賤有此六賤者主為供役也六極六極者身大頭小為一極男主妨婦女主妨夫額狹靣小為二極不得父母之力目小為三極主無見識又主不得朋友力耳小為四極主壽命短促鼻小為五極主無爵祿有官亦多失位口小為六極主饑寒犯此六極者乃寒賤之人也六惡六惡者一曰羊睛直視主性不仁常懷毒害二曰唇不掩齒主性不和難共交往三曰結喉主妨妻殺子多招災厄四曰頭小主貧而夭五曰三停不正主貧而賤六曰定立如走主奔波寒苦有此六惡不可與同處矣男尅子孫兩眼如離舍唇褰鼻凖尖髮粗眉又重骨弱下垂肩卓立如寒勢頭低步縱前三陽低小小妻室愈難全色嫩多財破聲雌沒穀田六親難偶合晚嵗定孤眠相無兄弟耳反家門破頤尖兄弟孤假饒三兩箇譬似不如無孤獨無妻人生孤獨為何如骨頰高兮氣不和更兼魚尾枯無肉妻子宫中似有磨帶殺格兩眼如狼目眉昂勢似侵神凶兼外射笑語却生嗔舉止如鷹坐戈鉞生掌紋色輕兼帶火聲大返雌音鼻凖尖無信斜窺定有刑須知三角眼法死不須論辨美惡有二十頭雖圓折腰肢額雖廣尖却頤骨雖峻皮却粗鼻雖厚柱梁低髮雖黑粗且濃眼雖長眉且蹙背雖隆手如枝胸雖濶背成坑舌雖紅口吹火唇雖方齒不齊腰雖厚行如馳腳雖厚粗無紋身雖大聲音細靣雖白身粗黑肉雖豐結却喉靣雖短眼却長氣雖清行步欹語雖和神似癡色雖明視東西坐雖正食淋漓行止二十種皆有折除惡善相雜若失相者或富則夭或貧則壽或貴則貧或先富後貧或先貴後賤宜精察而裁之女子相一隂一陽其道不可亂一剛一柔其道不可易確然處乎上者天也隤然處乎下者地也天以剛健為道地以柔和為德是天地之常儀乾坤之大理也且人生也禀隂禀陽分柔分剛男資純陽之質也故其體剛而用健女受純隂之形也故其體柔而用弱若夫男子者形反柔而懦性反雌而弱女人者形反剛而勇性反雄而暴皆非得中正和平之美是得差忒鬱勃之氣也故女體性柔和儀貌秀媚者富貴貞潔之良心性剛暴形質雄惡者貧賤凶災之兆也略舉此見女人之大概也女人九善頭圓額平為一善骨細肉滑為二善髮黑唇紅為三善眼大眉秀為四善指纎掌軟紋如亂絲為五善語聲小圓清如流泉為六善笑不見睛口不露齒為七善行步詳緩坐卧端雅為八善神氣清媚皮膚香潔為九善女人有此九善為邑封之貴也女人九惡蠅靣為一惡主妨夫結喉為二惡主招橫禍蓬頭為三惡主下賤蛇行雀步為四惡主貧賤眉逆而交為五惡主窮下妨尅鼻上生勾紋為六惡主妨尅招厄目露四白為七惡主毒害凶狡雄聲為八惡主剛暴再嫁旋毛生鬢為九惡主頑賤尅子女人有此九惡不可同居矣女人賢貴部龍角纎纎細起直入髮際者后妃天中印堂有肉環者后妃微者夫人伏犀隱隱而起者郡主牛角虎角輔角隱𨼆皆起涉人額者並主將帥夫人頭圓項短者主富額平而方者主貴眉長而秀者賢婦眼秀而清者貴閣鼻直如削者貴而多壽眉分八字者性和而福口細有稜者令婦舌如蓮花者淑質唇如朱砂者令妻齒如石榴者命婦人中深又直者多子目下潤澤宜兒耳紅而圓者貴婦耳成輪廓者賢富左耳厚者先生男右耳厚者先生女唇多紋理者多子頤生重頷者富豪髮青黑如細絲者貴婦掌紅如綿者邑封骨細而肉膩者貴質肉潔體香者令相性緩氣柔者福壽神靜色安者貞潔笑而閉目者和美行而詳緩者淑麗掌中足底生黑痣者貴而益夫腋下乳間生旋毛者善生貴子矣女人賤惡部頭尖者下賤額狹者貧厄額角有旋毛者再嫁惡死額狹而髮垂者貧窮災禍髮捲攣及赤黃者窮下鬢蓬枯燥而粗硬者厄惡眉粗濃而逆生者妨夫産厄眉薄散而頭交者重嫁害子目露而白者妨夫目深而偷視者奸私尅害目下有壅肉者死厄尅兒赤縷貫睛者産難目生三角者凶惡目大而平滿者淫邪瞻視不正瞳子橫者外情鼻陷孔露者貧下尅夫鼻尖曲者狠毒貧賤人中平狹者無子兩頭頰高危者凶暴口如吹火孤孀口如一撮者貧賤口大而綽者窮當三嫁口薄而尖者心懷毁謗唇薄如一字者下賤毒性唇起如龍觜者尅夫惡死唇褰齒露者妨害壽夭唇青舌黑者淫穢下賤耳反而垂者妨夫害子目小黧黑者命短窮困靣橫生拳骨者不良害夫蠅生麻㸃者孤窮尅子靣凸而額窄者貧下頦尖而鼻綽者賤苦項薄似馬靣者妨夫項長結喉者自害手短而指禿者下賤貧苦足濶而腳薄者窮寒奔波遍體生粗毛者性頑孤寡兩腋下生硬毫者身賤而下肉粗骨硬者一生寒賤皮薄而氣臭者百年窮苦聲雄而大者妨夫不良聲小而破者無財多破也掩口笑者外情搖膝坐者偷濫乳頭小狹者無子無財乳頭小白者絶子絶貴胸高臀凸者一生為婢腰折而項癭者百年孤苦行如馬奔者妨夫下賤行如馬跳者奔波窮類色赤而燥者性暴妨害氣濁而神昏者主多災死目下有羅紋者殺夫害子目下有立理者孤孀無嗣額多橫文者貧苦妨害臂如橫紋理者少寡無子目上斜交者嫁必私逃井竈有紋者娶必害夫有釣理者淫盜妨夫有立理者惡死人中有橫紋者害殺夫十餘女人之相與男無逺更以前諸男子相一一推之貴賤吉凶可自明矣女富貴鼻直如懸膽唇方口似胚眉疏并眼秀齒白更方頤耳聳垂珠軟神和色又怡額方分日月體白潤香肌坐穩如山立神嚴不去卑莫言當自貴更主子孫竒女貧賤額窄又髙眉唇掀口不齊靣輕身鐡硬體薄更無威耳小垂珠淺鬈毛鼻骨低哭形須再嫁鬼臉定無兒淫光生眼角嫉妬更姦欺莫言今受困晚嵗更羈恓婦人孤獨婦人眼下肉常無不殺三夫殺兩夫見人掩口笑不斷愛逐行人半夜逋
