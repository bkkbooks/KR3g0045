body:
  text: 太清神鑑卷二雜說上篇大貴之相有三曰聲曰神曰氣蓋聲清則神清神清則氣清驗此三者其形骨次之是以古者方伎之妙有聞人之聲韻而知其必貴者得之於神也有察人之喜怒操守而知其必貴者得之於氣也故聲欲響潤而長神欲精粹而藏氣欲舒緩而靜反此者不貴也若夫有聲而有神氣不應則其貴必遲有神而氣怯聲破則其貴不逺有氣而神聲慢未可言貴也此三者幽而難明𤣥而難測惟意所解口莫能宣也雜說中篇成形而不可變體具而不可移大凡形體惟在完滿隆厚清潤崇重平正華秀不貴則富也若怪而粗古而露清而寒秀而薄者皆非美相也古人論部位之法以額凖頭地角左右顴為五嶽以眼口鼻耳為四瀆以上下分九州十二辰由此觀之則一形之微其所該也大又烏可淺淺而論哉故上自天子下自庶人其五臟六腑百骸九竅之形皆同然其所以為形則異也若辨析之須於三停五行中先觀其要妙次求其部位氣色左顧右盻尋根揣本則貴賤貧富吉凶夀夭灼然可見矣雜說下篇形體身骨相之根本也氣色相之枝葉也根本固則枝葉繁根本枯則枝葉謝論相所以先究形體身骨而後氣色也夫氣舒則色暢氣恬則色靜氣通則光潤華明見於色此皆氣色之善也氣偏則色焦氣滯則色枯氣蔽則憔悴暗黑見於色此皆氣色之凶也若夫形如枯木心如死灰淡然不與世俱此又至人之相不可以氣而論也已上三篇與玉管照神雜說同金書寶印上篇形以清奇古怪者須得神與氣合若神氣不爽則孤露古塵俗怪寒薄輕沈非貴相也得清如寒冰奇如美玉古如蒼巖之老松怪如泰山之盤石雜之千萬人中見而異之者乃清奇古怪之貴相凡有此相必須操修過人功業隆重聲聞天下也形有五寬五短五慢五露五急五藏何謂五寬曰氣色曰行坐曰飲食曰言語曰喜怒全此五者必逺大何謂五短曰頭曰手曰足曰脛曰身全此五者中流之相也何謂五慢曰神曰性曰情曰氣曰行全此五者夀而發於遲也何謂五露曰眉耳鼻齒眼全此五者清烈孤貴異顯之相也神露路死夭折何謂五急神氣性皮骨發早而易喪也何謂五藏視藏神言藏聲見藏色思藏息聽藏氣全此五者清貴逺大之器也前此六說中有可採宜更致思定有所得五惡殺兩眉短尖眼常如淚此為卒暴殺鼻折凖頭曲斜羊視此名自吊殺目睛黃動口不合唇此為扛尸殺肉橫四起暴露不檢此名凶暴殺眼中赤筋眊反强視此名聞亡殺茍有一焉皆不能善終常以此言為當也金書寶印下篇山川麗秀而氣不同此人之生其形性所以有厚薄輕重清濁之異也故閩山清聳人俗於骨南水平而土薄人俗於情北土重厚人俗於鼻淮水泛濁人俗於重若宋人俗於口蜀人俗於眼魯人俗於軒昻江東江西人俗於色如此類者皆風土致異故也論相而及此者幾於神乎唐舉論相不好言形而好論色不好言聲而好言氣余以為深意也蓋形聲一定而不變所以易色氣屢變而不一所以難若唐公者是故欲精其難能也常得渠所著論氣色之文夫人之氣色皆發於心縈於肺觸於肝散於腎暢於脾故氣色光而神靜血通飲食流暢喜之也氣色昏則心亂血滯飲食脹逆憂之也喜憂之候外見則浮如薄雲之濛日內見則隱如圭璧之有瑕或盈而慘舒或發露藏息長者如絲細者如毛圓如粟長如麥斜如倚竿皆氣色之現也極致目力徹旦而視之憂喜足徴矣面部一百二十位人生也雖有善惡之形而貴賤未可分雖有吉凶之色而禍福莫可詳是以聖人以一面之形分百二十之部上應三才下配五嶽俯仰天地之位辨别內外之方見其形則知其貴賤察其色則驗其吉凶也其謂至賾至深莫可得而隱也且天中者最中之位以象人主所以威制萬方故刑獄在傍兵衛在後公卿前列府庫左右精舍為神靈之府故動於眉睫之上學堂為聰明之館故近於耳門之前目者受色福故妻兒俱列於目下財者為人之貪故盜賊依於金匱山林近於仙路弓弩落於邉方承漿近口日角居天且上停者又為天曰主祿中停者又為人曰主夀下停者又為地曰主富三部亦為三主上停初主中停中主下停末主故上停豐滿初年福祿中停隆厚中年成立下停缺陷者晚年破散大體吉凶貴賤無所不攝今略舉此數端可皆以此求之中央直下一十三位天中主過事又主官祿髙起直者初年得官平滿者宜逺行有官祿缺陷者主刑獄死天庭主三公貴品之部若有骨起者當為卿監骨起而兩邉𤣥角應之必任宰輔有黑痣缺陷主刑死一名天牢主貴人之牢亦名鴻臚寺亦名四方館骨陷色惡不宜此處任官司空主天官三公之部骨起光澤者當任三公九卿色惡不吉中正主羣寮之事詳品人物之司亦主官位髙下進退骨起色潤澤主官不歇滅印堂主天印兩士亦名揚闕庭掌符璽之官方寸起而瑩者二千石守方寸平而靜者三品任官不離闕庭方寸陷者亦主富貴眉接連不廣一生無祿當傍有黑痣瘢痕事或不吉也山根主有勢斷絶主多厄無兄弟狹薄而低者並無勢力眉鼻上亦名玉衡又廷中平滿或有奇骨伏起者招國租之喜但衡上依依上侵則名聞朝野若陷窪而目得相見者則情淺識露謀事難成年上主已身之疾病骨肉起一生無疾患陷缺者主惡死有黑痣者主貧苦夀上主命之長短事之吉凶陷缺者無夀又名怪部青色赤黑交錯怪兆也應林木為怪應欄櫪牛馬為怪應井竈釜鳴井沸為怪準頭主富貴貧賤百事吉凶端正圓平直充滿者富貴有官準頭齊者心性慈準頭分妨尅兒左為蘭臺右為廷尉成就平好者聰眀見識人中主人心性亦主子孫深直端廣者忠信有子孫中蹇而短者夭命孤獨貧有黑痣女人當自嫁正口主信文充實平正稜成者有信行薄弱缺陷者多詐妄有黑痣者主貴吉利承漿主飲酒如有黑痣不宜飲酒醉而當死平滿者一飲五斗常朝酒食一名藥部主服藥色暗服藥不得力地閣主地土屋宅平厚者多田宅而富狹薄者即主貧苦頦頥主貧富圓厚平澤者富尖陷者貧窮長者主尅害骨肉天中橫列八位天獄一名理獄主刑厄平滿者不犯刑獄缺陷及色惡者多遭獄厄左廂主丞相平滿者吉利骨起與伏犀相連者當入宰輔陷缺坎壈者亦多灾厄內府主金玉財寶骨起平滿家纍珠玉身復仁孝缺陷者淫蕩消折亦獄死髙廣主方伯之座豐起者當任刺史平吉利有黑痣少喪父母陽尺主近佐之官肉骨豐起位佐郡之職缺陷者主官歇滅有黑痣者客死他鄉武庫主兵甲之吏骨肉起者宜任兵之官若有瘢疵缺陷者不宜任此職亦從軍之敗有黑痣兵死赤色主鬬傷黃色不宜受寄尸兵轉角主郡守之位骨起而色眀者主任藩府一名弓弩有黑痣主兵死微黑主退官失祿赤色暴病或爭競官職輔骨大即官大輔骨小即官小如無骨不可求官邉地者主邉郡之職亦主逺行吉凶肉起吉利邉地骨峻起者主護御之權黑色不能逺行陷者為奴僕使有黑痣色惡者不問男女皆客亡天庭橫列八位日角主公侯之坐充滿洪直骨起者主御前常坐光澤行人避道天府一名王府主入朝否泰是故天府枯燥有官而無道房心主師侍之位骨起者為人之師骨起而黃色光澤者為國師色惡者非時主病上墓左右主父母之位骨起者宜父母光澤子孫滿堂黑痣缺陷主溺死色枯燥者父母不能葬四煞主手足妨之病四時煞害之事黃色憂傷損黑色被賊引縮缺骨起皆憂煞害平滿光澤者一生不被害戰堂主征戰事色斑惡者戰不還色好平滿戰勝缺陷兵死骨起為將驛馬主乘騎之事色澤者如乘馬去陷缺者無乘馬之祿色惡者乘馬有死弔庭主喪亡之事弔庭白如梨花父母死微白即披服及黑痣喪服多時矣司空橫列八位額角主公卿之位缺陷一生無官骨起為公卿一名額中色紅黃者大吉黑色主死色惡主厄向人叩頭赤色發如豆主刀兵死上卿主正卿之位亦主家鄉骨肉起而常光澤為官必親御座色惡逺離家鄉少府主府寺之位骨起者任府寺色惡有官主失職右府黃起貴人微名不出季月應之交朋主朋友之位骨起及色紅黃者交友輔强缺陷者一生寡合色惡與朋友爭競色青外婦相愛色赤外婦求離色白妻有分情道上主出行之位亦名衡上骨起一生常在道路平滿一生不出遊缺陷及色如馬肝主客死道傍交額主福祿之位骨起肉起及色好者主有福德黑痣者吉色惡及陷缺者一生不崇福德重眉主勇怯之位骨肉如重眉主有勇富貴缺及色惡皆主怯弱貧賤山林主野積之象山林廣厚必多藏蓄又多勢力淺薄無勢力不可委任大事一名崖色有黑痣入山林主被蟲傷亦名四季天子即看兵馬强壯四方人物美惡色黑四方有賊黃色四方安靜凡人色黑不宜逺行中正橫列九位龍角為顯貴之位有骨肉端美從眉上積起涉額如龍角者主為使相女人為后妃若形盤薄狀如蚯蚓者心多妬忌也虎角帥將之位當主兵權一名疑路主行之象也色好宜行色惡慎出有黑痣者行不還牛角主權貴之位骨起如角者使相之權輔角乃職制之位骨大者官職大骨小者官職小陷缺者終身無祿𤣥角主官祿之位骨起有角者全祿無角者不可求官釜㦸主金吾之位骨肉起者有兵革之權色好武選清顯陷缺者兵死華蓋主邪正之事深厚主夀有官短促刑獄少夀淺薄殃邪一名厄門有惡色黑痣及平落主暴死一名皮部乾枯者主經商銷折福堂主福祿之事豐厚者有官祿無灾富夀狹薄者貧夭無官一生又遭非橫之灾郊外主出行之事若惡色不可逺行骨起者一生不可出遊有黑痣陷缺者他鄉死矣印堂橫列八位家獄主刑厄之事平滿潤澤者一生不徒囚一名頻路若是常不潔者主多憂陷缺者獄死蠶室主女工之事平滿光靜家內宜蠶陷缺無田蠶色惡妻妬不良林平主仙道之位骨肉起及色常光澤者修道德或急或惡缺陷者服藥死精舍主僧道之位平滿色澤釋慧有成缺陷色惡者釋無成嬪門主宫嬪之位豐潤色好者妻婦吉慶缺陷者妻婦厄劫門主劫盜之位骨起肉豐及色好者永不被盜有黑痣常被劫發惡色劫賊青路主私路出入色瑩澤好者出入則吉色惡者不宜出入則有厄難巷路主公路出入色澤淨平者出入則獲福祿色惡者出入則有凶惡也山根橫列十位太陽主口舌喜慶色惡主鬬訟有黑痣常憂爭競色好男得好婦女得好夫中陽主家室之事青色夫妻欲離黑色主病赤色夫妻鬬競其色好得暴財之吉少陽主灾厄顯色有厄平淨少灾青色起入目者憂色顯鞭箠之厄外陽主相謀之事黑色主被人枉謀青色被寃枉死魚尾一名盜部主盜賊之事有黑色為盜所害色好一生不被盜陷缺是賊人也色惡被引也奸門主奸私之事有黑痣為奸盜所害奸門有肉起媱穢不避親踈色惡坐受奸刑發色好得美婦天倉主食祿之位平滿圓成肉豐主食祿此中不滿縱得官常得貧任一名軍門有黑痣陷缺者有軍中之難也天井主財帛之位平滿富盛有痣井厄天門主開闔詳占之事又名地户發好色主吉慶之事發惡色主婦人與爭訟𤣥中主修行之路在天門之後近耳也豐廣者學道有成有黑痣不可出家主虛誕而無成也年上橫列十位夫坐女左為夫坐男右為妻坐主夫妻吉凶之位光澤端滿者男有好婦女有好夫有黑痣者男主妨妻女主妨夫長男主長男之位定長男好惡黑痣主妨長男中男主中男之位定中男之吉凶非時發赤色如豆者不出一月共婦鬬競也小男主小男之位定小男之好惡婦人有黑痣則主妨夫外男主外子亦主孫息之位如有黑痣害父母一名外宅色平滿好者男得貴家之妻女得貴家之夫目下都名房中春若三月青黃色者有子之象男有黃色者生女女有黃色者生男白色子死赤色子厄皆以四時氣推之有黑痣憂子灾目下端平光澤生男女尤多金匱主金銀之位平滿光澤者主積金銀枯陷者主財乏有黑痣主有財被盜盜賊主偷盜之位平滿者不被盜賊發惡色即是賊內禁主內禁口舌之事平滿者一生不說人長短缺陷有黑痣常懷毁謗遊軍主邉逺之職平澤色美者宜任邉逺之官色惡不宜逺行書上主學堂之位若不潔淨或有黑痣缺陷者主無學問夀上橫列十位甲匱一名財府主財帛之庫平滿光澤者一生足財若陷缺色翳者一生乏財帛往來主行人之位色澤紅黃者行人不出月內至枯燥者行人不來堂上主六親之位色紅黃主親戚相聚之喜色白主喪父母兄弟端正看人難易之位色枯燥缺陷者性難色澤端正者主性易也姑姨主姑姨之位左看姑右看姨骨起肉色好者姑姨美好枯燥則姑姨多病缺陷者無姑姨權勢主勢權之位端圓豐澤者有權勢隳毁者無勢權兄弟主兄弟多少之位右為姊妹之位左偏髙妨兄姊右偏髙妨弟妹端濶光澤者兄弟强衆兩頰如雞子單身一世外孫主外孫之位看平滿光澤色定外孫多少吉凶命門主夀命長短骨起入耳必百嵗不死有黑痣火燒赤痣兵死色惡常疾病患學堂主學識之位骨隆端色淨潔者文學聰明骨陷色枯黑痣瘢疵者無學問也準頭橫列八位號令主號令之位端淨分眀者主施設號令衆數咸伏若無出令人終慢之一名夀部長而美重而分主夀髙逺上竈主宅舍之位平滿主好宅舍陷缺無屋可住宫室主人房室之位天子曰掖庭色惡及缺陷者主妻婦病厄宫室則主嬪妃疾厄典御主僕使之位看奴婢多少平滿一生不乏奴婢陷缺枯燥一生無奴婢囷倉主食祿之位平滿主有祿食缺陷饑餓死發青色者主憂官灾後閣主寄居之位骨肉豐起一生不寄住缺陷定他鄉之館也中門主富祿之位平滿無黑痣者主家道富缺陷一生無祿而貧兵人主兵使之位平滿者有兵驅使缺陷急惡無兵使用也人中橫列八位井部主田宅之位平滿者宜田宅缺陷者一生無宅居止有黑子溺死帳子主帳厨之位豐潤主有厨帳窄狹主乏厨帳細厨主飲食之位平滿者足陷缺乏膳發惡色為食死白色咽酒食致死黑痣餓死黃色暴死內閣主闈閣之位豐滿者闈閣深逺色惡閨閣淺穢缺陷亦然小吏主看多少有無妓堂主妓樂多少女妾有無之數媵妾主妾媵多少平滿家足妓妾之樂嬰門主醫學之位若缺陷蒙翳亦不喜服藥正口橫列八位𤣥璧主珍寶之位髙峻色美家蓄金玉色惡缺陷金玉散失矣門閨主閨闈之事亦主閨閣深淺色惡者閨幃有變比鄰主鄰宅之位平滿色好者良鄰陷色惡者有黑痣多鄰有惡人惡巷主里巷之位如惡色發者出入被劫骨肉起者無賊害客舍主賔客之位平滿端好者好賔客缺陷者不喜見人兵闌主走使之位陷缺者家無走使家食主榖食之位平滿色美足糧食缺陷色惡虛名商旅主興販好惡山頭主路之位平滿者出入無險難缺陷者多灾也承漿橫列六位祖舍主父母田宅平滿光澤者足祖業陷缺者無田宅有黑痣主棄祖移居外院主牛馬莊田平滿足莊田牛馬缺陷者無色惡者牛馬損矣下墓主墓田之位平滿色潤主有墓陷缺色枯者積代不葬野土主雞犬猪羊多少子孫進益之類荒丘主外國之類平滿光澤者宜外國遊行天子巷此中平滿主外國來朝欽庫主車行之位方滿主宜乘車缺陷乘車騎有厄地角橫列七位下舍主外宅多少平滿多外宅缺陷有黑痣者貧而無外宅也奴婢主奴婢之位平滿者多奴婢缺陷黑痣一生奴婢乏使碓磨主碓磑磨坊之位坑塹主厄難之位有痣者主墮坑險死陂塘主池塘之數平滿者足陂澤缺陷者無田湖有黑痣主涉江湖而死發惡色者憂口舌鵝鴨主蓄禽養之利看多少之數大海主水死之位赤色溺死黑色失尸黃色宜涉江湖矣二儀相應肅肅出乎天赫赫發乎地兩者交通已成和而萬物生焉此乾坤二儀之應也故能富萬物盛德大業無所不至矣且人之二儀者亦有像焉以頭為天以頦為地又以天庭像天地角像地此兩位欲得豐滿相朝上下相應故亦能富貴福祿矣五嶽五嶽者上應天之五星下鎮地之五方髙峻敦厚所以卓然立於乾坤之內者以其相資而成天地之大也人亦有所像焉故額為衡嶽欲得方而廣頷為恆嶽欲得圓而厚左顴為泰嶽右顴為華嶽左右欲得圓而正鼻為嵩嶽欲得髙而峻故五嶽須要豐隆而相朝髙峻而不陷乃相之貴矣人倫風鑑同四瀆地之四瀆者所以相朝以接其流通人之形貌亦有像焉且鼻為濟目為淮耳為江口為河故四瀆欲得端直清大眀淨流暢涯岸成就者則應於神故貴而多智也若夫醜而不端則為愚人毁而陷者則為賤類也人倫風鑑同五官五官者目為鑒察官鼻為審辨官口為出納官耳為採聽官眉為保夀官五者欲得清而秀豐而隆或一官好則貴十年或有缺陷者及醜惡者凶六府兩目上為二府兩輔角為四府兩顴骨為六府六府者欲得平滿光而瑩若一府好乃富十年或有缺陷疵瘢黑痣者凶也五行所生木為仁主英華茂秀定貴賤也火為禮主勢威猛烈定剛柔也金為義主誅伐刑法厄難灾危定夀夭也水為智主聰慧眀敏定賢愚也土為信主德載萬物定貧富也五臟所出肝出為眼又主筋脉爪甲心出為舌又主血氣毛髮肺出為鼻又主皮膚喘息脾出為唇又主肉腎出為耳又主骨齒也五表所屬之方耳屬北方壬癸水眼屬東方甲乙木舌屬南方丙丁火鼻屬西方庚辛金面屬中央戊已土五行相生歌耳有垂珠鼻有梁金水相生主大昌眼眀耳好多神氣若不為官富更强口方鼻直人須貴金土相生紫綬郎唇方眼黑木生火為人志氣多財糧舌長唇厚火生土此人有福中年昌眼長眉秀足風流身坐金章朝省堂五行相剋歌耳大唇薄水剋火衣食貧寒空有智唇大耳薄亦如然此相之人終不貴鼻大眼小金剋木一世貧寒受孤獨眼大鼻小難為成雖有資財夀命促舌小耳大水剋火急性孤獨區人我耳小舌大亦不仁慳貪心惡多灾禍舌大鼻小火剋金錢財方盛禍來侵鼻大舌小招貧苦夀長無子送郊林眼大唇小木剋土相此之人終不富唇大眼小貴難求到老貧寒死無墓五行比和相應耳反須貼肉鼻仰山根足眼露黑精多唇反齒如玉臉近於眼口必主公卿福只恐夀不延性氣剛難伏四學堂位一曰眼為官學堂欲得長而秀清黑白分眀主有官職二曰當門兩齒為內學堂欲得白而平正密而瑩大者主有忠信德行三曰額為祿學堂欲得方而廣瑩而峻主爵祿富貴四曰耳門之前為外學堂欲得平滿光瑩主聰眀學識也三輔學堂上輔學堂者身自天中至印左右橫列十位謂之二分部光潤全起成就平如徑寸主大貴出將入相官至二品更若中輔全者位極人臣一品之職上輔有一部缺陷仍以中下輔參之此而不成就止主參領權務出納主命官至二品或中下全陷無部應得主給承郎武侯更東西嶽起地角髙額相應之時節㦸方面或中輔更一分應之必為真宰之位當榮極旺二十年早遂中限當秉生殺若下輔二分應者亦無缺陷當主大權然下輔主繁冗之職即不能久居相府當鎮方郡必建旌旗若下二分與上輔全備即使相矣若上合一分中輔一分全者亦主內制清要之位或只相部合一分五釐餘别無應形足氣清必給評御史之職更中輔五釐應之必殊常緊要之位才名挺動四方中輔二分全者應為成就主卿監丞相兵將之權或東西嶽起地角朝厚武官主侯伯之封中上三分全好者大權一為皆少通無滯一為旺二十年所謂蘭膏成就學堂寬博真貴人也若學堂或圓或方五分俱起統攝萬邦助國王侯伯之相以上若一位枯乾惡色亂紋痕壓皆為破陷雖郡城職位多滯迍邅也中輔學堂者自山根下至準上兩眼正口并額骨六位謂之一分位若位豐隆或若紅紫色光澤無斷紋痕翳黶黑痣主都察臺閣清資不然兵刑之位一生少滯無灾有聲名更下輔一家全應必為四品蔭深一作卿監正郎之職若下輔二分全與中輔俱好即三公尚書侍郎不入兩府有威權重名動朝野武臣則建節方外將帥之權其下輔成其中輔有五釐不成就亦主卿監四品官若中輔全就而龍虎外起並主三品之位如形神端靜部位相稱骨氣清秀頭角深長髙入髮際主給諌清要之職其氣昏濁部位不眀疵瘢黑痣是謂缺陷有破乃一生少權無聲多滯官職歇滅凡相人宜細詳消息則不失矣下輔學堂者自𤣥壁下至頥額四位謂之二分位二位豐滿眀澤光潤而全成就者主卿監正郎兵將藩府繁劇要務之任如武臣則防團刺史守邉之職如二分俱備只左右破陷四釐者可取準頭應之亦主員五品三品職官武則諸司使副之位然須多滯晚年方逹者下輔每分即有五釐兩處共成一分者京官幕職而已若中輔兼得二釐光潤平滿亦可位至員郎或上輔兩三部中相應合成一分七釐者主正郎聲望清顯其上中下三輔合得八釐者文主令録幕府之官武當借職班行之位若三兩處每處二三釐合成一分者雖無官職亦主衣食自足若上部一分學堂員郎之位二分學堂兩眉分制或中下學堂應之則將相資財職上部學堂二分共三分者不入兩府主兵將之權共得四分者出將入相五分全就者總攝四方貴不可言也上左右十位二分中六位一分下四位二分都計五分此也
