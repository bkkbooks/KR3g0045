body:
  text: 提要太清神鑑六卷術數類五命書相書之屬臣等謹案太清神鑑六卷舊本題後周王朴撰乃専論相法之書也考朴事周世宗為樞密使世宗用兵所向克捷朴之籌畫為多歐陽修新五代史稱朴為人明白多材智非獨當世之務至於隂陽律法莫不通焉薛居正舊五代史亦謂朴多所該綜星緯聲律莫不畢殫然皆不言其善於相法且此書前有自序稱離林屋洞下山三載遍搜古今集成此書考朴家世東平入仕中朝逰迹未嘗一至江左安得有隱居林屋山事其為依托無疑蓋朴以精通術數知名故世所傳竒異詭怪之事往往皆歸之於朴如王銍默記所載朴與周世宗微行中夜至五丈河旁見火輪小兒知宋將代周其事絶誕妄不可信而小説家顧樂道之宜作此書者亦假朴名以行矣然其間所引各書篇目大都皆宋以前本其綜核數理剖晰義藴亦多微中疑亦出自宋人非後來術士之妄談也其書宋史藝文志不載諸家書目亦罕著録惟永樂大典頗散見其文雖間有缺脫而掇拾排比猶可得十之七八謹褒輯成編釐為六卷朴之名則削而不題以袪其偽焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀原序至神無體妙萬物以為體至道無方鼓萬物以為用故渾淪未判一氣湛然太極才分三才備位是以隂陽無私順萬物之理以生之天地無為輔萬物之性以成之夫人生居天地之中雖稟五行之英為萬物之秀者其形未兆其體未分即夙具其美惡藴其吉凶故其生也天地豈容巧于其間哉莫非順其世循其理輔其自然而已故夙積其善則賦其形美而福祿也素積其惡則流其質凶而處夭賤此其灼然可知其確然不易也是以古之賢聖察其人則觀其形觀其形則知其性知其性則盡知其心盡知其心則知其道觀形則善惡分識性則吉凶顯著且伏羲日角黃帝龍顔舜目重瞳文王四乳斯皆古之瑞相見之間降之聖人也其諸賢愚修短猶之指掌微毫絲末豈得逃乎故相論形神之術自此而興焉其來極多其論至冗許負袁天綱陶隱居李淳風之後不可勝計然皆窮幽探賾得之至妙其或紊亂所説或異或同至使學者不能貫於一致余自稚嵗潛心於此考古驗今無不徵效遂特離林屋洞下山三載遍搜古今考之極玄者集成一家之書目之曰太清神鑑以其至大至明形無不鑑至清至瑩象無不分然未足奪天地賦形之機亦可盡人之性形耳謹序
