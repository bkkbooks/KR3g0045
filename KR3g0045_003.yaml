body:
  text: 太清神鑑卷三心術論形不勝貌心不昧術久昧者不明也為物所役故屈於用心為事所奪故謬於擇術卒至凶咎悔吝之及也然後怨天尤人比比皆是每一念想未嘗不為太息然臨事制物正心術而可取者有七乖心術而不可取者亦有七所可取者何一曰忠孝二曰平等三曰寛容四曰純粹五曰施恵六曰有常七曰剛直其不可取者一曰陰惡二曰邪穢三曰苛察四曰矜誇五曰奔競六曰諂䛕七曰茍且此皆出心術之不同而感於異也此古人有論心擇術之戒也或曰心術之不可取與所可取者各有此於形可得乎曰貌端氣和者忠孝骨正色靜者平等眉開眼大者寛容氣和閑暇者純粹面開凖黄者施惠鼻直神定者有常形肅貌古者剛直有是七者在所取也眼凶神露者險惡眼下嫩色者邪穢眼深肉横者苛察眼有忿氣者矜誇眼急色雜者奔競視流容笑者謟䛕氣麄身搖者茍且有此七者為心術在所不取也如眼下肉生龍宫福堂黄氣盤繞是有陰徳之人也夫徳物無心臨事無物體道而出體道而入世間種種一無干吾之靈臺果何心術之有哉所謂心術者乃以勉人之不及而已懼而行之亦可以同歸乎善而受道也玉管照神七可取同論徳徳為義大矣哉天之有大徳也四時行而長處高地之有至徳也萬物生而長處厚人之有徳也亦若是矣故天道祐之人心歸之享長生之榮且能孝於親能忠於君能和於人能濟於物為徳之先為行之表雖未陽賞必獲陰報未及其身必及子息是以善相者先察其徳而後相其形故徳美而形惡無妨為君子形善而行凶不害為小人荀子曰相形不如相心論心不如論徳此勸人為善也又言其徳為先矣夫形者譬之匠也材既美矣匠拙則棄之乃為不材之木也人之形美矣茍無徳則形以虚美而天禍人損遭之淩辱無疑也是知徳在形先形居徳後乍可有徳而形惡不可形善而無徳矣死生論古之至人以生為勞佚以死為休息是以知來去非我而可以生可以死也將獨立乎萬物之上斡旋乾坤於太虚之中果何得死生而相耶此鄭之神巫見帶人子始以其子不可復治終則未死而老也徒下愚而不知道汨沒世事認已為有認物為我以生為可悦以死為可惡内焉所蔵於心思慮縈縈妄意一生面目乃變使人得以相之故神昏者死神亂者死神浮者死神雜者死以此言談動止俱失當不過數旬而死矣須更看淺深而斷然不可拘也嗚呼死生亦大矣世之迷者改頭換面沉溺苦海不知究也胡不斷所寂滅觀相識本來面目証果大事者而不然未免流轉死生之途而受苦惱也論神神之為道出而不可見隠而不可求故虚而無形也則是索之於心隠而無象也則可測之於形昭昭然見於眉目之上幽幽然運於五臓之裏故人云晤盡則神逰於眼六徳則神思於心是神出處於形而為之表猶日月之光外照萬物而其神隠於日月之内也且夫人之眼明則神清昏則神濁清則六徳多六昧少濁則六昧多六徳少夫夢之境界葢神逰於心而所逰逺亦出五臓六腑之間與夫耳目視聴之内也其所逰之象與所見之事或因想而成或遇事而至亦吾一身所自有也故夢中所見之事乃在吾一身之中非出吾一身之外矣故白眼禪師說夢有五境一曰虚境二曰實境三曰過去境四曰見在境五曰未來境是神躁則境生神靜則境滅則知是境也由人動靜而生者也夫望其形而灑然而清或翹然而秀或皎然而明或凝然而瑩眉目聳動精彩射人皆由神發於内而見於表也其神清而和明而徹者富貴之象也昏而濁柔而怯者貧薄之相也實而靜者其神和玉管云詳而靜者其神安虚而急者其神躁故於君子善養其性者無暴其氣其氣不暴則形安形安而神不全者未之有也又云氣者陰陽之移人無寒暑之故不其難乎髣髴之間變則有氣神則同乎氣而有所主也及乎氣變而有形神止乎形而有寓也變而有生神則未嘗生變而有死神則未嘗死古之得道者不染塵埃不役於事為知神之妙與太虚同體知神之㣲與造化同用則為聖人至人神人為用如此是形在人世間者神則蔵於心發現於眉目之間猶未失其本真則以古為上清次之蔵次之媚又次之如流散昏濁是其從迷至迷一至如此不足論也聳然不動視之有威謂之古澄然瑩徹視之可愛謂之清怡然灑落視之難捨謂之媚各得其體格神氣而賦之未有不為公卿達而上則神仙矣媚雖有貴乃阿䛕謟佞之人雖在朝廷身之進退亦何足數似明不明似峻不峻謂之流散似醉不醉似困不困謂之昏濁嗚呼人之喪精失靈不知神之所謂以至為萬物同出入於機不知覺也論神有餘神之有餘者眼色清瑩顧盼不斜眉秀而長精彩聳動容貌澄徹舉止汪洋灑然逺視若秋月之照霜天巍然近矚似和風之動春蘤臨事剛毅如猛獸而步深山處衆逸超似丹鳯而翔雲路其坐也若介石不動其臥也如棲鳥不揺其形也洋洋然如平水之流昻昻然如孤峯之聳言不妄發性不妄躁喜怒不動其心榮辱不易其操萬態紛錯於前而心恒一斯皆謂神有餘也神餘者皆為上貴之相凶災難入天禄永保其終矣論神不足神之不足者不醉似醉常如病酒不愁似愁常如憂慽不睡似睡如睡纔覺不笑似笑忽如驚忻不嗔似嗔不喜似喜不驚似驚不癡似癡不畏似畏容止昏濁似染顛癎神色慘愴常如有失恍惚愴惶常如恐懼言語澁縮似羞隠蔵體貌低摧如遭淩辱色初鮮而後暗語先快而後訥此皆謂神不足也神不足者多招牢獄枉厄有官亦主失位矣論氣論一人之至好御二氣以成徳交通而和也則萬物遂其性命乖戾不調也則萬物失其理此乃天地之氣見乎變化也石藴玉而山輝淵藏珠而川媚由夫至精之寳見乎山川也萬物之情美莫不發乎氣而見乎色矣夫形者質也氣者用也氣所以充乎質質所以運乎氣是以由氣以保形由形以安氣故質宏則氣寛神安則氣靜得失不足以動其氣喜怒不足以驚其神則於徳為有容於量為有度是謂厚重有福之相也形如材有松栢荆棘之異氣有規矩準繩之工隨材而成器隨形而制體故君子以形為善惡之地以氣為騏驥之馬善御之而得其道也是以善人之氣不急不暴不亂不躁寛能容物若大海之洋洋和能接物類春風之習習剛而能制萬態不足動其操清而能潔千塵不足汙其色小人反是則不寛而隘不和而戾不剛而懦不清而濁不正而偏不舒而急但視其氣之淺深察其色之躁靜則君子小人可辨矣氣長而舒和寛裕而不暴者為福壽之人急促而不匀暴然見乎色者為薄淺之相也且氣之為道又發乎顔表而為吉凶之兆也其散如毛髪其聚如黍米望之有形按之無跡出入一面之部位又應人之禍福若氣呼吸無聲耳不自聞或臥而不喘者謂之龜息壽相也其或呼吸氣盈而動者乃為夭死之人孟子不顧萬鍾之禄以善養其氣者也爭升合之利而悻悻然戾其色暴其氣者何足道哉氣之所以養形在五臓六腑之間因七情而歛散故發於五嶽四瀆之上有六氣之變能清濁以無餘湛然寂如固山水之淵非六氣可得而取也青龍之氣如祥雲襯月朱雀之氣如朝霞暎水勾陳之氣如黑風吹雲螣蛇之氣如草木將灰白虎之氣如凝脂塗油𤣥武之氣如膩烟和霧六氣之中惟青龍為吉其他或主破散或主憂驚或主哭泣或主陰賊如骨形不入格終身為所累如形骨正當候得數然後氣散名顯也亦看所賦之深淺而消息之人有異相不貴由為雜氣所繞如逺山竒峯秀嶂小為雲霧所蔽不可得而見也一遇匝地清風當天皎月奇峯秀嶂非特可覽於目前必使留戀難捨也大畜秘神氣歌天中青色見年内染㣲疴直下來年上定主見閻羅只到天牢上入獄亦由他並準青光起憂驚病至多青中更又黑必損自家錢散下雙家獄官事欲相牽印堂黄氣起官禄定高遷白氣家遭䘮青來口舌纒中正發黄絲守令職無疑赤㸃中心出公事别妻兒青光驚必恐黑色怪神窺白色憂䘮事迍邅事日隨白絲攔鼻上繞口當年哀黑生一月内財被賊來欺黑氣横長起夫妻欲散離白光横過鼻子息更妨之訟獄横氣起在禁脫枷災青絲下眉首入獄共咨嗟黑氣如斯至獄死更無救赤又浮青色離獄亦有咎黄氣生高廣如鼔掛懸空百日為明牧無中定貴封黄色來四季應好事千通色又房心應官高職轉雄若占天中位榮華與廣同雙人促一鼔必定拜三公入準天中應侯王列土封印堂黄似月魁第扼朝中日角黄絲髪兄弟有懽怡白光來庫墓刀兵自失期入匱愛財物𤣥坐鬬訟疑喧爭觀上下朱光口舌非厨中發黄色喜在六旬餘或因州府事得職又非虚房心生日花飛道入山家不來日下住抱疾主顛邪天庭發黄色白屋出公卿青白如還起高官被罷停白黄居此位妻兒又折迎若遇他人婦必定共交情鄉路黄絲發公卿白日封赤氣離鄉走黑光死路中白色來就額不出五旬間走䘮終是有防避定應難眉頭黄色起喜事自相迎若見紅光起吉慶更加榮白氣圓眉轉因之或受驚直下君須看入獄見災迍若下來年上徒流仔細防中陽黄氣起至年定封侯赤氣來奸坐婦人外遭偷尺陽黄潤澤妻妾豈常人目下黄來耳官職自榮身眉頭生赤氣準上又相迎多應一年内無辜入杳冥白光逰目下哭泣即時聞旋繞眉閒轉家因犯鬼神黑光遊目下子息病相侵若方圓一寸罪至決歸刑顴上黄色新叅迎見貴人白光停巷路定作逺行身黄白入奸門飛來入精舎婦人自此奸不論春與夏直上準頭齊陰相得盜藉走去右顴停妹姊外人話入至家人部定作郎君婦黄光逕兩耳年中封壽位直下似人形女人得貴壻赤色在邊庭渾家被大驚若上山林際尖炎滅夭形青光在耳畔蛇蝎惡侵君白絲來兩眼當為病死人赤光生甲匱入至命堂中只因財產上訟事見災凶赤色入欄櫪牛馬不能行青光被觸損黑氣至無生奴婢赤氣起僕走休咨嗟若有𤣥光發身當死女家陂池發青色田水有凶災白光防井溺黑氣墜江哀部位并生尅五行意審裁一虚含萬物消息屬天才紫堂靈應補氣歌赤氣天中年上停若纒眉際定歸㝠只在天中獨横立斯人清晝被刀兵赤下目來紅潤澤因公得爵定分明赤若眉頭分目下男私外婦女他情天中白氣來邊地年内逢災急須避直下印堂官事起夫婦生心要離異黑臨地部愁親病婦人產難終須定若為凖上入奸門無故因他婦害命只來坐上自當身是定文書來喜慶黑色夭中欲得平下來雙獄受繩刑若到年上身遭病直來入口死於刑氣似烏虚至顴勢忽到兩眉憂卒死若如小帶横眉上壽絶人間並無子圓光黄色天中見士人必拜公侯靣凡度之流皆主權氣色四時看改變状如鐘皷下天獄公卿自至榮高禄若似蛇狀位星郎庶人得之進金玉中庭懸鼓三公相蠶絲之氣得官禄色若黄澤一世終無䧟獄刑印堂黄色方寸明八旬之内入朝庭赤色來之主失職上來忠事堪經營鼻梁火色憂官撓青來年上病相縈白氣當年遭哭泣黑氣入口死分明司空黄色應時開五旬之内横財來上至印堂封爵禄如日初升位輔台準頭赤色似生麻八旬之内有諠譁若在公門逢此氣定遭笞撻至君身白氣至頤年内死又知魂魄有虚驚黑色兩邉憂父母青光黑白䘮家親人中黄色甚奇哉不及眉間喜异常若更通行兩頰上必定髙榮作正郎可憐藥部生𤣥色見病之時不用醫天府黄廕光潤澤三旬之内得天財狀如細栁抽纎葉身入朝堂列鳳臺若如紫色紅光潤不出旬中喜語來闕庭黄色上天中大拜公侯在季中若至司中㣲進退四方相接入皇宫武庫紫黄如懸鼓將軍印綬位非虚若立若飛來入相不宜受物寄閑居兵闌武庫即同看赤光白日被刀攅白色外來驚險難黄光出將見加官黑氣遭兵須陷死青光上送無多端語息四時生改變此篇靈應細詳觀氣色法訣凡看人氣色須天色方曉傍起時就幃幄中以紙燭照看辨認方驗吉凶無失共就簷光處面背非本分氣色者也輙不得洗靣盥潄飲湯藥然後看之亦難驗矣且五臓初氣色即早朝靣養息於心故侵晨觀之則見五臓五色清氣朝於靣也其凶惡氣色無時朝發於靣或觸事憤怒而發或感物憂喜而成或飲酒而色赤青或營幹而亂理色活漫皆非本臓之色一時亟發而成故吉凶難辨也其有不於早晚看者第令凝神静坐良久看之庶幾有徵焉若夫不拘早晚酒後醉中怒間汗後更不停待而看者此則又有一時浮暴之氣發現其先見之吉凶難可得也氣色形狀青色如𤓰黄色如蠟赤色如火白色如脂黑色如漆此五者色之正發之甚者也五臓所生一曰水水之於物為精其臓在腎其神𤣥㝠發色為黑其旺在冬精具矣則神從之也二曰火火之於物為氣其臓在心為神丹元發色為赤其旺在夏神至矣則魂從之也三曰木木之於物為䰟魂者陽物也其臓在肝其神龍煙發色為青其旺在春䰟在矣則魄配之也四曰金金之於物為魄魄者隂物也其臓在肺其神皓華發色為白其旺在秋精神魂魄備其意在焉故五曰土土之於物為意意者其臓在脾其神常黄發色為黄其旺四季也是故皆朝於一面而息於五臓也五色所生定憂辱青色主憂事若色厚者主憂重色輕者主憂㣲色散者主憂鮮色盛者主憂𦂳色白主哭事若色厚者主大䘮浮者主輕䘮色散者主外服也色顯者主䘮近也赤氣主擾若色盛者主刑獄色濃者主刑死色黯者主病重色散者主病瘥也黄色主喜慶若色盛者主大慶色薄者主小喜色散者主喜退急者主喜近也六神氣色兩眼黑白分明神光紅黄精彩射人者謂之青龍之色主遷轉官軄招進財帛喜慶之事面色赤如撒丹擾如烟昏者病燥者謂之朱雀之色主有官災口舌驚擾之事面上拂拂如灰土色精神昏濁者謂之螣蛇之色主驚憂怪夢不祥家宅不安之事眼色湛濁黑白不分神光昏翳眼下青鋪者謂之勾陳之色主牽連負累迍滯之事兩眼白氣閃閃似淚不淚瑩白光者謂之白虎之色主䘮凶亡服外孝之事唇黑而顫口傍左右黑氣拂拂者謂之𤣥武之色陰私小人相害失脫損盜之事𤣥靈寳文夫氣之色發天府如豆大貫鬢邊有黄色應者主得藩郡之任黄色光在印堂當中有一紫色如豆者一年内主大拜黄色在天部貫金匱及連至精舎道術又華盖上盤旋縈繞者主得兵權及轉軄賞財兼產主得貴子紫色如少蠶許主將加官或是封拜其次領鎮如顴骨上兩道黄色横者主出外必當喜事旬日至如青色從耳門前出下臨大海者受少驚恐若黑來主有閒憂内應黄在兩法令上及連至準頭者横財四十日應更壽上有應者得財萬貫已上青在山根通過兩眼頭者主陰私公事紫色從兩天中天府直下者又如蠶絲三五月半年外作丞郎青色從天庭上如韭葉大垂二寸者主外服期至十日至紅色如梧桐子許在地部上主百日内往南方領郡天中黄色直下來中正者八十日内恩賜詔書至少赤色眉上垂下者主勘事青色或在目上赤色垂貫眼及顴上赤者四十日内憂危刑法印堂有黑赤極分明命門青者一月内中風六十日内死潤澤赤者即不死赤色從耳門出似馬肝色此是將染腹疾之厄赤色如筋在準上下至人中二十日内被人損外口舌公事至赤色從年上分貫兩顴者八十日内有大殺公事及身不至死地部上起赤色者􅀈酒濁病赤色貫兩令上者憂公事四十日至赤色從鼻尾中下入家舎者奴婢中有陰私口舌事成赤色如毛從耳邊出至及蘭堂上應者一月内主馬失墜厄眼頭上下有黄色下垂者左是男喜右是女喜及妻有喜赤色從眉頭連幞頰額邊出者主虧官物被勘責事二十日内至如黄色似蠶絲錢許者貫左右兩眉上更印中應時八十日内主朝判府推也色黄如印足起貫邊地者二十日遭公事失位逺行之憂若黄色應即解之赤色從太陽上起入邊地起者被損失眼臉色如筋許從外入者被人謀已從内出者擬有相訴之說謹慎眼上下臉俱赤者主家有重病人若印部有左右赤色憂父母厄年上㣲赤主患脾之病老不至安壽上及準頭者亦憂重病黄色從金匱起貫連壽上甲匱不到懸壁主得財其喜兼得水土官一年内至東起貫大海内當年主水災地部紫色圓黄色主貴顯赤色如撒者二七日内主爭訟事起或如麻筋在兩法令上入獄厄㣲赤刑獄并兩府來嬪上主爭競之事黄色如筋斜兩位者主東南上勾當公事得財或丁部南上奉使得財物若更臨金匱如車輪者得財萬數也色論天之蒼蒼其正色邪雲霧乃其氣耳人之賦形受命於天地相為流通是所稟之氣有變動而色有定體也定體之色不止於蒼蒼其屬有五行之異金色白木色青水色黑火色赤土色黄得正色為五行不相尅者不滯為貴雜色蔽之即差然色之正不可無氣現日月角温粋可愛為貴如枯燥昏暗不獨難發亦平生多主脾胷心腹之疾水火獄訟之厄或因骨肉法部局可取縱發則災立至古人有蠶吐絲之說自頷而開其吐絲也通體明快人之將發自準頭而開其頓發見無翳然後發入諸部位則見所任之職所居之分如發入處有瑕翳則軄分不免有凶或無瑕翳則全吉矣更在知五色所生非吉凶之屬論色無出此者有神色未透天庭亦發者是其準頭開而得部位貴皆以相應不必至天庭也或有陰晴未定不必至凖頭也所謂貴處印堂帝座内府馹馬龍虎日月地角是也無貴而頓覺是謂不祥此說非言可盡修養之功消息之至可見矣若夫觀之寂然難取難捨有道者之色觀之瑩然不雜不亂得意者之色如嬌如滿自得者之色視之慘然陰合陽散細人之色視之茫然如得如失有憂之色其頓發皆凖頭也觀妙經色論同五形之人得其本色或得相生之色者善五色得地者春色要青夏色要紅秋色要白冬色要黑又盡善也餘與瑋琳洞中秘宻經同四重旺相休囚春三月青色旺赤色相白色囚黑色死夏三月赤色旺青色相黑色囚白色死秋三月白色旺赤色相青色囚黑色死冬三月黑色旺白色相赤色囚青色死四季氣色形狀春欲起夏欲横秋欲下冬欲蔵失其時者皆不利也亦猶四時物理且春欲起者春有出生之象夏欲横者夏有長養之象秋欲下者秋有收歛之象冬欲蔵者冬有閉塞之象其有或方或圓形象萬端者亦在别術斷之青色出沒青色初起如銅青將盛之時如草木初生欲去之時如碧雲之色霏霏然浮散五行屬木旺在春相於夏囚於秋死於冬發則主憂枯主外憂潤主大憂混主逺憂散主憂觧應在亥夘未日及月以色深淺斷之青色吉凶歌天中光澤得詔貴枯燥須憂詔責亡秋色發從年上去陰私口舌厄難當陽尺憂行兼疾病天庭主客繫堪憂交友婦須通外客司空忽起被徒囚巷路但成百里威大陽定與妻相打外傷枉死被讒言若是太陽連入目必招縣宰惡笞鞭房小春發當生子壽上當憂口舌牽坑塹對須㸔大怪陂池壽上應以上同蛇怪不堪言山林花馬妖呈異欄櫪馬牛有怪愆忽在井竈釜鳴響不然井溢湧寒泉命門甲匱憂凶厄凖頭兄弟父母䘮散失主邊防失職人中愁有别離傷承漿不日當遭病大海須防水溺亡若臨月角須憂賊若有川文官禄遷日角臨蠶如傅粉印堂退口病遲延道上或逄憂阻滯山林蛇虎厄難當若來金匱并墻壁財物三旬共可傷姦門怕被外妻撓眼下横來病苦纒壽上若逄憂病厄更憂債負禍來煎口畔入來憂餓死更兼枉濫事相牽三位囚傷子孫損半月之閒入墓眠天門三十日財至天井圓珠武官位病人値此病難安囚人見之尤迍滯黄色出沒黄色初起如蠶吐絲將盛之時如蠒之未繰或如馬尾欲去之時如栁色之花摶聚斑駁然五行屬土旺在四季相於春休於夏囚於秋死於冬又為胎養之發則皆主吉慶但不宜入口即主瘟病日則在酉申寅午戌日應之旬則在子午戌辰旬應之萬無一差須以深淺斷逺近為定耳黄色吉凶歌黄色天中列土分圓光重大拜公卿更過年上井竈部有功常受賜高勲或如月出照年上天中入定當宿衛入朝門若經兩闕天中入即徴拜金匱天中入詔賜帛與銀忽至闕庭天中入官驟轉不然即是得財盈或是龍形須受賞如懸鐘皷位槐庭若似蠶絲官必得春來年上喜忻忻武庫光潤將軍福亦主喜慶陽尺并母墓喜并田宅事更宜父母少災迍司空百日得財寳右府裏内勑來徵重眉交友如棊子七箇旬中左右丞更過重眉過山林天中者徵為博士最為榮印堂如月六旬内拜作將軍鎮百城便似連刀天庭至上至天庭下及凖頭亦分明斷他縣令忽遷轉長吏分官直闕庭大體發時多喜慶亦言逺信至逡巡山根聽向皆稱遂太陽必定得財慶少陽喜慶重重過魚尾有吉引前行若似龍形年上見連色天中拜上卿眉眼之下有子象左黄生男右女生婦人有以反前諭金匱家内財帛人壽上栁葉主財入歸來逺信至中庭出自凖頭庭衝位天中天庭驟貴封侯起有乗蘭臺必得尚書綬内厨酒食倍逄恩大海惟宜渉江者日月三公位顯清甲匱生來財主庫内倉中似有蛇形道尚三位財如拾中角牛馬喜方成眉位有園多好事酒樽酒饌得豐醇赤色出沒赤色初起如火始燃將盛之時炎炎如絳繒欲去之時如連珠累累然而去於五行屬火旺在夏相於春死於秋囚於冬發主公私鬬訟口舌驚擾之事潤主刑厄細薄主口舌鞭笞應寅午戌并己未日旬中則辰戌以色定之赤色吉凶歌天中連印鼻頭赤中旬車馬驚令死下來年上爭競災左右逺行須病住陽尺驚恐厄鬬生武庫友婦折傷災天庭必有憂囚事若見司空鬬罵來交友朋求離别去在職當憂上位刑無職定同父友鬬額角如値死於兵印堂爭鬬被憂囚若在山根驚怕憂太陽夫妻求離别年上暴厄亦堪愁又却斷他生貴子房中妻不產賢侯三男三女病災迍壽上如豆與妻爭年上凖頭連發此夫妻爭鬬太難明命門甲匱須兵死凖頭官府事牽縈墻壁之上財必失外圓當紫得官榮武官巡捕㸔魚尾盜賊收擒倍稱情牛角㸔來牛馬厄山林蛇虎又堪驚忽眼下如蠶絲發妻子因何爭鬬聲金匱奸門招撓事承漿為酒起喧爭陂池井部相連接因水逄財却稱情田上見之田地退口邊横入禍全生酒樽酒肉宜相㑹地閣田岸有訟成若在山林須慎火又兼家内損財并命門發到山根止更過眉上左耳平只定六旬遭法死婦人右耳疾來頻白色出沒白色初起如白塵拂拂將盛之時如膩粉散㸃或如白紙欲去之時如灰垢之散五行屬金金旺在秋相於夏囚於春死於冬發主哭泣憂撓潤主哀泣細憂重浮憂輕散病瘥應在巳酉丑日旬在子戌旬中應之及秋月白色吉凶歌天中春色來年上鬬戰刀兵事可愁左廂必定主憂惱陽尺將行走外州發在奸門因婦女皮乾入獄内遭囚又主男女相妬害交友婦須被外求山根見者主憂囚男女逄他必死憂壽上徒囚君不見堂上父母死堪愁命門甲匱凶來急内厨酒肉致傷亡承漿逄見身當䘮大海遭時主水殃印堂白氣哭爺娘若在命門兄弟當姦門若招主私慟中嶽横紋有家䘮日月角中憂重服法令陂池脚足傷眼下横紋夫婦鬬凖頭還是競田庄地閣横遮牛馬損若侵年壽死公婆入口分明憂口舌囷倉上有賊還多黑色出沒黑色初起如烏鳥尾將盛之時如黑髪得膏欲去之時如落垢昧五行屬水旺於冬相於秋囚於夏死於春發主病災厄潤主死亦兵亡枯翳客死散主病痊日應在申子辰日旬應在甲寅旬及冬月以旺為應黑色吉凶歌天中必定失官勲忽於顴上似官刑若還至下來年上病患相纒䘮此身天獄年上應獄死高廣逄時病主亡陽尺過來凶可得天庭客死在他鄉四煞賊來成凶賊司空病疾苦纒身右府生來憂此位重眉不利逺行征額角黑廣善為偷印堂移徙㸔他州山根必死於旬日太陽疾病厄堪憂牢獄至眼憂牢獄法令入口形分八更有眉頭青色應百日飲酒還醉殺眼目兼更赤色閒二旬或訟見血光外陽發被人欺刼年上憂死困灾傷男女憂他男女厄壽上入耳卒中亡命下甲匱遭燒死凖頭憂病外來殃黑發三陽黑氣多失官停職事波波更上發來年壽上天中有黑見閻羅黑氣入口死於夏顴上兄弟婦奔逃奸門切忌女相干日角若臨妻亦亡井部黑氣水溺死印堂退光非謬假横飛壽上防逄災六十日内須應也黑氣額上父母死生來眼下子孫殃若見下來年壽上自然病死入㝠途黑氣三陽至盜門奸私賊冦豈堪論更見黑色鼻凖上知君財破避無門黑生妻部及年上妻厄身災非是旺更兼入井下陂池切記水殃心莫忘黑氣朦朦散面門四季切忌小災迍若生口入氣厨竈必定遭他毒藥人黑色天中年壽上更從地閣似烟籠又如黑色初發散此箇須㬰命必終眉間横入左右耳百日之中人定死天明天井忌失財驛馬常防遭險墜虎角頻遭虎犬傷人中井部水中亡年壽山根同位斷地閣爭田訟見殃若侵法令遭公訟大海見之奴婢逃墻壁生來合中嶽定歸泉下哭聲高紫色出沒紫色初起如兎毫將盛之時如紫草欲去之時如淡烟籠枯木隐隐然得土木之餘氣為四時胎養之氣亦旺在四季更無休囚發皆為吉應日亦與黄色同意矣紫色吉凶歌紫氣天中八時分蘭臺月角得財頻法令生來逄印信終是刑名不及身壽上俄然一字横家中新婦喜分明天門川字將軍祿天井圓珠享大榮𤣥璧福堂知積慶若當地閣創家居山根忽有終加職驛馬全生喜有餘𤣥璧左邊遷官職山林精舎喜相須陂池位上增餘福中嶽横紋貴自如十天羅者天之凶殺之神也人亦有所像多滿面黑色四起為死氣天羅白色者為䘮哭天羅青色者為憂滯天羅玉管照神局又云青色深者亦主䘮死黄色者為疾病天羅如脂膏塗抹者為酒食天羅眼流而視急者為姦淫天羅色焦如火者為破敗天羅如醉如睡者為牢獄天羅笑語失節者為鬼掩天羅氣如霧昏者為退散天羅也論氣色定生死訣凡氣色者額上忽有氣如塵抺者名曰醫無休廢六十日内死額上連髪際黑氣或白氣狀如蚯蚓横起者名曰連天休廢二年内死左右鼻孔黑氣横過如虚氣者名曰垂起休廢不出六日死左右眼下如塵黑氣生者名曰靈光休廢一年内死頤下拂拂如塵起行連項者名曰纒命休廢八十日内死印堂上有赤白色血者名曰毁祿休廢受極刑死九十日應鼻上忽忽如塵起或如粉塗者名曰理獄休廢主居官破位三年内死左右額上拂拂如塵起者名曰傍行休廢二年内死財破六親離厄左右兩眼忽有白貫入神光者名曰烖神休廢一百日内死口四邊白色旋繞者名曰守魂休廢五十日内死左右耳邊忽若塵成兩三條者名曰動海休廢一百日内刑獄死左右耳輪後灰旋者名曰通遊休廢一百日内刑獄死左右耳輪後氣如粉氣者名曰飛天休廢六十日内死腦後連腦白氣如塵飛起成條者名曰貫中休廢三十日内主死決也定病氣生死之訣五蔵有五氣五氣各有時春三月白氣入口耳鼻者死此得囚死色也餘皆倣之凡看病人青色從上入下者易瘥從下去上者難愈凡常白忽黑常黑忽白常肥忽瘦常瘦暴肥神魂常靜而恍惚似醉者色澤常清而忽昏濁如黯者豐足不常之變盡為卒死之兆矣病人目㝠㝠妄視舌卷縮者謂之心炤即日死面色慘黄唇青短縮者謂之脾絶不出十日死齒牙乾焦耳黑而聾者謂之腎絶不出旬日死口張不合眼晴反惡者謂之肝絶不出旬日死肥膚枯槁鼻黑孔露者謂之肺絶不出旬日死凡人目下五色併起者不出十日死髪直乾脆者不出半月死面色忽如馬肝望之一如青龍之黑不出三日死四墓發黑色者死年上横黑氣者死五命廢得紫色者皆得鬼色死之人也
