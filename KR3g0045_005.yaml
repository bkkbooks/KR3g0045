body:
  text: 太清神鑑卷五論骨肉立天之道曰隂與陽立地之道曰柔與剛故地者具剛柔之體而能生育萬物也山者地之剛也土者地之柔也剛而柔則崒嵂而不秀柔而剛則虚浮而不實故人之有骨肉者亦若是矣故肉豐而不欲有餘骨痩而不欲不足有餘則隂勝於陽不足則陽勝於隂隂陽相反謂之一偏之相肉當堅而實骨當直而聳肉不欲在骨之内為隂之不足骨不欲生肉之外為陽之有餘故人肥則氣短馬肥則氣喘是肉不欲多骨不欲少也乃隂陽和平剛柔得中骨肉相稱理之善矣故暴肥氣喘速死之兆肉不欲横横則性剛而多横肉不欲緩緩則性柔而多滯遍體生毛則性剛而又急肥不欲紋薄者近死之應肉欲香而煖色欲白而潤皮欲細而滑皆美質也肉重而麄皮硬而堆塊色昏而枯皮黑而臭癃􅂒多者非令相也若人神氣不明筋不露骨肉不居體皮不包肉皆死之兆也又云肉充為膚肉欲寛肥人宜輕清不露痩人宜堅重不枯反此者皆不善若為肉横者為帶殺肉病此主㓙暴貧夭也巍巍峯嶽堅立萬福堅剛而峻鬱茂而秀此乃天地之骨也人之有骨莭亦象山嶽金石欲峻而不欲廣欲圓而不欲粗痩者不欲肉少而骨露露者多艱多壽也玉管照神局註云肉不輔骨則骨露乃多難少福之人也肥者不欲骨隠而肉重重者乃逆滯夭壽也玉管照神局註云肉肥重乃遲滯之人也肥不欲滿或滿而盈者乃速死之人也骨與肉相稱氣與色相和者福禄之相也背攢而體偏骨寒而肩縮不貧則夭不夭則貧矣玉管照神局註云謂背攢而體偏骨寒而肩縮凡物有萬状人有萬形亦有折除或窮而壽或富而夭故云不貧則夭也日角之左月角之右有骨直起名金城骨位至公卿印堂有骨稜而至天庭名天柱骨従天庭貫頂名伏犀骨位至三公半頂以前主初年半頂以後主晚年或有側㫁者有迍滯之失靣上有骨卓起者顴骨也主有權勢顴骨相連入耳名玉梁骨主壽考自臂至肘名龍骨象君欲長而大自肘至腕名虎骨象臣欲短而小故龍銜虎則福虎銜龍則賤夫骨之法欲峻長而舒圓而堅直而莭應𦂳滑而不麄惡筋而不纒則為上相也且人雖有竒骨亦須形相稱色相助方成令器茍諸位不應雖福壽而不貴也宜在詳之玉管照神局同相又與五總龜骨同骨者體之幹所受宜清滑長細内外肉相稱若骨堅立輕細與骨肉薄者近於寒也大扺須得聳直不横不露與肉副應者為善相也董公論此骨法曰鳳凰骨鸚鵡骨駱駝骨犀牛骨猿骨此說微妙難曉用意深者亦可知也論額部分一靣之貴賤辨三輔之榮辱莫不定乎額也故天庭天中司空俱列乎額是非攝諸部位繫人之貴賤也故其骨欲隆然而起聳然而濶其峻如立壁印堂上至天庭有隠隠骨而見者少達而榮邉地山林皆欲豐廣坑䧟貧賤額兩邉輔角骨起長大者三品之貴天中天庭司空中正印堂五位得端正明净聰明顯達之人也若狭小而髪亂低覆者愚而貧賤也額靣小窄至老貧厄額大靣方至老吉昌額角高聳職位崇重天中豐隆仕宦有功額小靣廣貴處人上額方峻起吉無不利額瑩無瑕一世榮華餘與瑋琳洞中秘宻經同論頭部頭部者處一體之尊為百骸之長羣陽㑹集之府五行正宗之鄉高而圓藏虚而大者令首也天高峻而清圓故三光得以照萬物無為而自運故道濟天下而體常不動曲成萬物之性而常不流是以頭之像天之形也欲得峻而起豐滿而圓像天之徳也欲得儼正在上不側不摇若夫尖薄而小缺陷而傾者貧下之儀也行坐低斜或摇或擺賤劣之相也故骨欲豐滿而起峻秀而凸短則欲厚長則欲方頂突者崇貴側陷者夭薄頭皮厚者足衣食頭皮薄者貧賤皮青者吉善皮白者下賤皮黄者貧苦皮赤者㓙災頭有餘皮者財食豐足頭有肉角者必大富貴左偏損父右偏損母耳後有骨名壽堂骨耳上有骨名玉樓骨並主官禄行不欲摇頭坐不欲低頭皆為貧弱之相也是以身小頭大卑賤之輩身大頭小觸事不了頭不應身先貴後貧頭通四角髙權超卓牛頭四方富貴吉昌虎頭高起福禄無比狗頭尖圓悲涕流漣鹿頭側長志意雄剛獺頭横濶心意豁達象頭髙厚福禄長夀犀牛崒嵂富貴無失駞頭蒙洪福禄永終蛇頭平薄財禄寥落狢頭尖銳窮厄無計額紋額之有紋貴賤可㫁若額方廣豐隆而有好紋者則爵禄嵩髙也如額尖狭缺陷更有惡紋者則貧賤無疑矣三紋偃上者名偃月紋主朝郎三紋偃上一紋直貫者名曰天柱骨紋主莭察武臣王字紋者主公侯丨天中丨紋下至印堂名曰懸雲紋主卿監印堂紋直上長三寸者名曰鶴足紋主刺史三紋繞者早䘮父一横紋而曲者名曰蛇行紋也主送路井字紋者主員郎川字紋者主憂慮刑䘮十字紋富而吉昌田字紋者富貴也山字紋者侍從之榮貴乙字紋者京朝之職水印紋者主榮貴顯達額上亂紋交足則貧苦多災婦女額有三横紋者則妨夫害子貧夭矣枕頭部人之骨法中貴者莫不出於頭額之骨頭骨額骨之竒者莫不出於腦骨成枕人之有此如山石有玉江海有珠一身恃以榮顯者也故人雖有骨竒異亦須形貌相副神氣清越方受天禄不然恐未盡善也夫腦後名曰星臺若有骨者名曰枕骨凡豐起者主其人一生富壽如或低陷必主貧夭三骨皆圓名三才枕主使相四角各有一骨聳起中央亦聳者名五嶽枕主封侯兩骨尖起者名曰雙龍枕主莭樞將軍四邉髙中央凹名車輪枕主公侯三骨並者名曰連光枕小者二千石大者將相一骨彎仰上者名曰偃月骨主卿監一骨彎俯下者名曰覆月枕主朝郎兩骨俯仰者名背枕骨主武闗防又云高文高顯上一骨下二骨分排而圓者名三星枕主兩副制官職兩方骨皆起角者名曰四方枕主二千石小者全禄一骨聳起而圓者名曰圓月枕主館殿清職上方下圓者名曰垂露枕主員外郎上下圓稜似盃者名曰玉樽枕主卿相小者主刺史三骨直起一骨下横承之者名曰山字枕主聰明富貴一骨圓一骨方名曰疊玉枕主富而榮一骨聳起而尖峻者名曰象牙枕兵將之權骨起四角者名曰懸斜枕主莭度武臣一骨横截者名曰一楊枕主巨富壽高大凡骨得近下者過腦而易辨近上者淺而難騐矣骨者一定之相有之則應也故古之有言頭無惡骨靣無好痣其言是矣瑋琳洞中秘宻經同論靣部靣之三停自髪際下至眉間為上停自眉間至鼻凖為中停自凖人中至頰為下停夫三停者以像三才也上像天中像人下像地上停長而豐隆方而廣濶者主貴中停隆而凖峻而静者主壽也下停方而滿端而厚者主富也若上停尖狭缺陷者主多刑厄之灾妨尅父母卑賤之相也中停短小偏塌者主不義不仁智識短少不得兄弟妻兒之力亦中年破散也下停長而狭尖而薄者主無田宅一生貧苦而艱辛也三停皆稱乃上相之人矣論眉部眉者媚也為兩目之翠葢一靣之儀表是謂木之英華主賢愚之辨也故欲疎而細平而濶秀而長者性聰敏也若夫麄而濃逆而亂短而蹙者性兇頑也眉過眼者富短不覆眼者乏財壓眼者窮逼頭昂者氣剛卓而竪者性暴尾下垂者性懦眉頭交者貧薄妨兄弟毛逆者妨妻不良骨稜起者㓙惡多滯眉中黑痣聰貴而賢眉高居頭中年大貴眉生白豪多壽上有直理者富貴横理者貧苦中有缺者多奸計薄如無者多狡佞是以眉高聳秀威權禄厚眉毛長垂高壽無疑眉色光澤求官易得眉交不分早嵗歸墳眉如彎弓性善不雄眉如初月聰明超越眉垂如柳貧浪無守彎彎似蛾好色性多眉覆眉仰兩母所養眉若高直身富清職眉頭交破迍邅常有也論眼部眼本清静所以生神為木星欲長秀分明白如玉黑如漆聳耳入鬢者大貴之相也若短小而明有異光輪動爍人者此又貴而有壽若睛凸四露視有神彩者亦主權殺或大而無光長而無神外無上下堂赤脉相侵睛視不逺眼頻動摇睡沉重不合目瞳黄者不善相也董正曰眼頭如眼尾開合含異光者神仙之相非凡相也更有白刄當前還自驚潰而眼不及閃者此主貴權上將之相也腰背法論行步緩而輕坐起正而實是謂有腰前視如負物後視如帶甲是謂有背有背無腰初發後滯有腰無背初困終亨於是發中亦多憂疑兩者全偹則一生享富貴毁辱不能及利害不能動即有徳之人且相腰背之法又不以魁偉而取但小以應小大以應大皆可矣故腰背有旋生者舉止重正靣開精神藏隂隲滿氣色明然後能生欲知生之時金以四木以三水以一土以五火則不能生也欲漸不欲頓欲停不欲偏如壅腫肥大乃肉滯矣非謂之腰背則牛行步緩取之得矣觀妙經腰背論同上論腰腰者為腹之山如物依山以恃其安危也欲得端而直濶而厚者福禄之人也若夫偏而陷狭而薄者微賤之徒也或薄短者多成多破廣長者保禄永終直而厚者富貴也細而薄者貧賤凹而陷者窮下裊而曲者輕劣蜥蜴腰者性寛而善尖蜂腰者性鄙而和夫臀高而腰陷者主賤腰高而臀陷者主貧大體腰欲端濶臀欲平圓則稱也論背背者一身之基址也人不論肥痩輕重皆欲有背夫有背者號為有上須得豐隆不俗如龜背而廣厚平濶前㸔如昂後㸔如俯者福相也或屈而視下頭低而蟠者非貴相也論腹腹者内包六腑圓長者可辨其貧富下養元靈扁大者可知其愚智故腹欲得圓而大者智而榮貴扁而長者愚而卑賤大而近下者名光朝野小而近下者清聰長者圓如玉壺者巨富窄如雀肚者至貧圓而近下者富貴圓而近上者貧賤尖而長者愚而賤横而圓者智而榮如抱兒者富貴如蝦䗫者貧賤貪婪如牛肚者積財蹇縮如狗肚者窮寒如猪肚者賤如羊肚者貧如衣裘者富如筲箕者貧寒肚有三壬者貴而壽肚有好痣者智肚端而姸者才巧肚扁薄而醜者愚苦又云腹者包容臓腑乃身之營也欲濶大而垂囊若横凸者非也或若雀腹䑕腹不為貴相也論臍臍者是筋脉㑹要之地為臓腑總領之闗故臍欲深而濶不欲淺而狭深而濶者智而有福淺而狭者愚而多賤生近上者衣食生近下者貧薄低向下者有識突向上者無智圓而正者善士斜而醜者惡人藏而深者福禄凸而出者賤矣大能容物者名榮邦國小而一撮者惡傳千里論四肢夫手足者謂之四肢以象四時加之以首謂之五體以象五行故四時不調則萬物夭閼四肢不莭則一生困苦五行不和則萬物不生五體不稱則一世貧賤是以手足猶木之枝幹莭多者則不材之木也故手足欲軟而滑浄筋骨不露其白如玉其直如笋其滑如苔其軟如綿者富貴之人其或硬而麄大筋纒骨出其麄如土其硬如石其曲如柴其肉如腫者皆為貧徒矣論手手者其用所以執持其情所以取舍故纎長者性慈而好施厚短者性鄙而好取手垂過膝者間世英賢乎不過腰者一生貧賤身小而手大者福身大而手小者貧手端厚者福手薄削者貧手麄硬者下賤手細軟者清貴手暖香者清華手臭汗者濁下指纎而長者聰俊指短而禿者愚賤指柔而宻者積蓄指硬而疎者破散指如春笋者清華富貴如鼔槌者頑愚如剥葱者食禄如竹莭者貧賤手薄破如雞爪足者無智而貧手倔强如蹄者愚魯而賤手軟如綿囊者至富手皮連如鵝足者至貧掌長而厚者貴掌短而薄者賤掌破而圓者愚掌軟而方者福四邉濃起而中凹者富四畔薄弱而中凸者財散掌潤澤者富掌乾枯者貧掌紅如噀血者榮貴黄如拂土者至貧青色者貧苦白色者賤如掌中心生黑痣子智而富掌中四散多横理者愚而貧也相掌文一井二井錢財萬頃横紋過指最為強壽限無過得久長若得掌中生十字一生富貴坐高堂手背紋多作事蹉跎成敗㡬次方得成和一紋華葢二紋破財三紋多成多敗尅妻若說華葢紋初主不安寜交入中限後末主事方成又云手之有紋者亦象木之有理木之紋理美為竒材手之有美紋者乃為貴質也故手掌不可無紋有紋者上相無紋者下賤紋深而細者吉紋麄而淺者賤掌上三紋上畫應天象君象父定其貴賤中畫應人象賢象愚辯其貧富下畫應地象臣象母主其壽夭三紋瑩浄紋無破者福禄之相也縦理多者性亂而灾横理多者性急而賤䜿理直上貫指者百謀皆遂亂理散出指縫者事事破散紋細如亂絲者聰明美禄紋粗如横木者愚魯濁賤紋如亂挫音剉者一世貧苦紋如撒糠者一世快樂有穿錢紋辨錢紋者主進資財有端笏紋揷笏紋者文官朝列十指上紋如旋螺者榮貴傍㵼如篣筐者破散十指上横紋三約者貴破為奴婢十指上紋有一鈎者賤被驅使有逸紋者將相有血紋者無印有偃月紋車輪紋者吉慶有隂隲文延壽紋者福有印紋者貴田紋富井紋貴十字者禄有策紋上貫指名光萬國有按劒紋而加權印者領軍四海有法闗紋者㓙灾逆而妨害有夜义紋者下賤而愈窮大凡紋襍主大好而或义破者皆為缺陷無成之相矣手背紋手背之紋其騐尚矣故有五和之理五者皆近指上兩莭者謂之就紋主天子之師下莭一為公侯中莭一為使相無名指有者主卿監小指有主朝郎大指有主巨富手背五指皆横文旋者主封侯王立理貫者主拜將相手背食指之本亦謂之明堂有異紋黑痣子主才藝高貴若成飛禽字體者又為清顯之貴大指本有横紋者謂之空谷紋主寛裕無所不納主大富若有繞腕紋周旋不㫁者謂之玉釧紋主人敬愛一紋二紋者主朝帝之榮三紋以上者主翰苑之貴男女皆問其紋須得周匝若或斷者絶者取證無騐矣爪部爪之為相亦可擇其美惡見其賢愚也尖而長者聰明堅而厚者壽秃而麄者愚鈍缺而落者病弱色紅而瑩者主貴色黃而薄者主賤色青瑩者忠良之性色白浄者閑逸之情如桐葉者榮華如半月者快樂如甋瓦者伎巧如板瓦者淳重如尖鋒者聰俊如皺石者愚下論足上載一身下運百體一為身之良馬一為地之體象故雖居其至下而其功至大是可别其妍醜而審其貴賤也欲平而厚正而長膩而軟乃富貴之相也不可側而薄横而短乃貧賤之質也足下無紋理者下賤足下有黒痣者二千石禄雖大而薄者賤雖厚而拘者貧賤脚下城跟者分及子孫脚下旋紋者名譽千里脚下薄如板者貧愚脚下凹容魚者富貴足纎長者忠良之貴足指齊端者豪選之賢足厚四寸者巨榮及富足排三徳者兩省之權大體貴人之足小而厚賤人之足薄而大焉足下細軟而多紋者貴相也麄破而無紋者貧賤足下有龜紋者二千石禄足下有禽紋者八位之職足下五指有五䇿紋者平生賢哲足下有井紋者升朝之官足下有錦繡紋者食禄萬鍾足下有紋如花樹者横財無數足下有紋如剪刀者藏鏹巨萬足下有紋如人形者貴壓千官有三䇿紋者福而禄有螺紋者富而貴兩小指無則是貧也兩小指皆有謂之十螺紋主性莭恡十指皆無螺紋者多破散矣
