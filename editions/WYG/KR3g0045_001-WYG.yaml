body:
  text: 太清神鑑卷一說歌道為貌兮天與形黙授隂陽禀性情隂陽之氣天地真人倫風鑑云隂陽之氣氛氲化出塵寰幾様人五嶽四瀆皆有神金木水火土為分君須識取造化理相逢始可論人倫貴人骨格定奇異㸔之乃為神仙鄰若非古恠即清秀若非端正即停匀人倫風鑑云丰姿不嫩仍端異骨格灑落松上鶴清頭角挺特真麒麟古森森修竹鎻流水秀峩峩恠石收閒雲恠崑山片玉已琢出端南海明珠光照室異夭桃繁杏媚春華可憐容易摧風日嫩坐中初㸔似昻藏熟視稍覺無晶光語言泛泛失倫序舉動碌碌多倉忙若人賦得此形相薄禄為官不久長坐中初見似塵俗熟視稍覺多清凉議論琅琅悉可聽容止悠悠而細長若人賦得此形相高名美譽攬金章更㸔面部何氣色數中惟有火多殃青多憂饒黑多病白多破財黄乃昌湛然沉静無瑕翳青雲萬里㸔翺翔富貴貧賤生處定但把形神來取正一部吉兮吉必生一部㐫兮凶必應部位吉凶各有主存神定意詳觀聽妙理不過於五行當究五行之正性木瘦金方乃常談水圓土厚何須競不露不麄不枯槁三停大體求相稱火形有禄終須破奔走貧寒多阻挫人倫風鑑云惟有火形尖更露縱饒得禄終多破雖因神秀暫榮華四十之上亦難過其餘相法固非一天收地歛終無失氣和神定最有常骨聳額寛根本實腰背端如萬斛舟瞻視盼顧如星斗肉隱骨中骨隱體色隱神中神隱眸若人賦得此形相定知不是尋常流氣宇汪洋有容物智量深逺多權謀動作令人不可料時通亦自為公侯易喜易怒屬淺薄易驕易滿屬輕浮淺薄輕浮神不定一生自是常常憂欲知富貴何所致馬面人倫風鑑作馬耳牛頭聳鼻樑有聲有韻骨格清有頥有面含神光人倫風鑑云起坐昂昂多神氣欲知貧者何所分面帶塵埃眼目昏出語三言不辨兩凹人倫風鑑作凸胷削背仍高臀赤脉縱横貫雙眼殺人偷盗身無存人生具體皆相同貴賤相近有西東冲和而上主清輕認其清者宜高崇滯伏而下主重濁認其濁者皆凡庸清濁一分知貴賤貴賤不離清濁中大道無形故無相此理元來本至公人倫風鑑云吉凶生於一念中人能移惡歸諸善自然可以消災凶人能安分委天命自然可以濟窮通人倫風鑑云自然可以起凡庸叔敖隂徳故所勸上相相心今孰同予作此詩真有理寄言賢者莫匆匆人倫風鑑洞𤣥經同又歌受氣成形三才俱備清則富貴濁則災否但㸔貴人神清氣爽眉目秀媚骨要堅隆骨肉相繼骨謂之君肉謂之臣骨過於肉君過於臣此乃貴人長夀無迍龍骨吞虎生必豪富虎骨吞龍一世貧窮下短上長富貴吉昌上短下長遍走他鄉面黑身白位至相國身黑面白賣盡田宅面麄身細一生富貴面細身麄貧困而孤額聳而隆不受貧窮額方面廣有田有莊額骨而髙必為僧道額上有紋早年艱辛若是女子夫位難停額窄眉深賣盡資金額有伏犀不富則貴眉秀而清四海聞名眉如初月衣食不缺眉骨而髙長受波濤眉有旋紋父母不停八字眉分一生孤貧眉頭相連夀短不延眉生纎毛上夀堅牢眉硬如錐晚嵗饑栖兩眼藏神富貴髙名魚尾插額位至相國睛色有黄為人不良若是紅紫刀劍中亡斜視如流為性姦偷三角有光賊性難防四白羊睛殺子不停反視鬬睛為性不平睛露臉髙促夀不超鼻頭圓紅不受貧窮若要清貴年夀通隆鼻梁曲陸一生孤獨鼻如鷹嘴啄人腦髓鼻梁􅇧横賣盡田園人倫風鑑云破盡平生鼻有縱紋尅子不停鼻頭青紫晚年窮死口紫而方廣買田莊人倫風鑑云口如吹火孤寒獨坐口上有紋失約無成口薄而輕親業如傾露齒結喉走遍他州耳有垂珠富貴雙居人倫風鑑云衣禄有餘輪廓皆成一世豐榮人倫風鑑云耳内生毫夀永年髙耳生黒子多招是非鼻梁耳返賣盡田産耳如箭翅貧窮破祖耳聳而朝富貴年髙髪踈而細位過兩制髮麄如麻貧窮可嗟女人髪拳尅夫連綿婦人髪黄遍走他鄉手如噀血衣食不缺手軟如綿衣食自然手紋如絲必為賢士手紋横生不聚資金紋如鐵斧法死衆覩人倫風鑑云紋如戈矛法死不留手上露筋一世艱辛聲如破鑼田産消磨聲鴨聲喑家計如傾聲如大鐃一世波濤舌上有紋牛馬成羣舌如紅蓮廣有田園舌短唇長晚嵗荒忙足下有紋大旺子孫足有龜紋一世清名足下黑子富貴賢士曲背駝腰子孫不超鴨步鵝行富貴家榮人倫風鑑云富貴清名行若蛇行親業如傾蛇胷鵲筋人倫風鑑云蛇骨鶴筋貧窮賤人頭大有肩富貴長年頭大無肩晚嵗孤寒身大頭小夀數極夭三停不直不為貴格南人北形富貴髙名北人南形産業如傾男人聲雌破却家資女人聲雄夫主不停眼下乾枯定殺五夫齒露聲雄殺夫貧窮更若有鬚不可同居形容如鬼殺夫不已面如哭形家業不成面上生靨夫位髙判形寒額尖夫位須死若是男子亦復如此人中黑子主養他子口上生者吐血而死淚堂生痣子孫難繼黑子口傍是非難防蘭堂生者富貴夀長眼下併紋子息難成縱理入口餓死不久法令入頥一生富貴紋入承漿夀限髙强令紋傍口財帛難守鼻凖有紋溺水而死骨怯神怯三犯須傾形重骨剛夀命延長三停隆直富貴無敵行步身斜破親亡家腦有玉枕九十為定鼻梁不正四十絶命鼻曲唇掀夀夭不延人倫風鑑云孤獨如夢肥人結喉夀短不留帶殺雙兼惡死居前有胷有背富貴無窮有背無胷晚嵗孤窮人倫風鑑云有胷無背貧賤如流聲音如嘲貧賤不貴身小聲雄位至三公身大聲小早嵗折夭此法秘之如金如寳人倫風鑑千字文同上相法妙訣相人形貎有多般須辨三停端不端五嶽四瀆要相應或長或短不須論額要濶兮鼻要直口分四字多衣食頭圓似月照天庭眉目彎彎多學識眉頭昻而性必剛縱理重重入天倉下視之人多毒害羊睛四白定孤孀鼻頭屈曲多孤獨項短結喉神不足男面似女女似男心慳藏事多淫慾眼眇雖小有精神更觀黑白須分明逺視有威近秀媚披緇學道好音聲眼睛黑少白多惡玉管照神云黑白分明定知畧眉長眼細足人情眼睛若露唇皮反男憂惡死女憂産若是頭圓須出家玉管照神云若還不是出家人在私必定遭夭難耳無輪廓多破散玉管照神云耳無輪廓破紋多細小無珠命短薄耳若聳長有輪廓衣食自然終不薄玉管照神云身與腰相應着忽若偏時終薄落頭大身小性慳貪身大頭小多消索坐要端兮立要直不直不端無見識先笑後語定非良不言不語人難測面上㸔來眉不同一上一下形如蟲如此之人若與交眷屬之人亦不中仔細㸔之須尋古但㸔金木水火土相刑相尅定取形若也相生須得地人中斜曲主横死上唇牽露多辛苦左眼小而右眼髙父母必定㓜年抛右眼小而左眼反家財宫中多破散更須㸔眼與單重再拜父母添宗族南人似北多富貴北人似南只有名有背自然能負荷學堂學館廣中親何須眉目定其貴先㸔骨兮又㸔肉骨肉兩般事更别清亦貴兮濁亦貴真濁真清方始貴若還認得濁中清早當食禄歸官位清怕浮而濁怕實更怕眉尾麄是一玉管照神陳搏先生䄂裏金同又云面圓人亦好更審聲音語須小如此之人若與交面前背後心難料大凡相法識根源金木水火土相連相尅相刑多破敗忽若相生富有年神秘論人之所禀在精神以火為神水為精火本藏心心為志精備而後神方生神生而後形方備形備而後色方明是知色隨形所生氣乃逐聲各有形有形不如有骨有骨不如有神有神争如有氣神之得氣旺於春大都神氣賦於人神氣若油人若燈神安自然精可實油清然後燈方明夜宿此心如寂寂日居於眼覺惺惺有時又有清中濁有時又有濁中清更兼風韻細數藏坐久凝然力轉强如此之人堪立事輕浮淺薄便尋常其次更㸔形與骨骨細皮膚軟而滑要觀生就與未就旋有旋生終可乆或然未好已先盈花未開而實已生老人不欲似後生老者應須要老成男子不欲帶女相女人不欲似男形隂反為陽夫早死老懷嫩色夀星傾丈夫女子兩般評女要柔兮男要剛女人屬隂本要靜未言先笑定非良良人有威而少媚娼婦有媚而少威令人一見便生侮所以居身在至㣲木要瘦兮金要方水肥土厚火尖長形體相生最為吉若然相尅定為殃金得金剛毅深木得木資財足水得水才學貴火得火威武播土得土多倉庫金不金反沉吟木不木多孤獨水不水多官鬼火不火多凶禍土不土多辛苦已上形論只於形體本先瘦木次後初肥最為要水生木若然始瘦又枯乾木帶金兮灾愈繁一如形體本方正次後背隆最為應土生金若然始方却又尖金見火兮實為灾初中最好末生灾腰臀都小步不開初中不好末主好腹肚初生懸壁倒有臀有背能負荷無背無臀空老大㸔前雖好未為好㸔後須好好到老馬上大兮馬下小更兼藏韻與藏神八座三台官豈小有財之人面似方有土之人多在背守土其在清資併極貴面似月兮身似貝有時舉眼隨身起有時接語和身轉近觀有媚逺無威久視方明初似晦更有一法何所謂只有鋒鋩始為貴器宇瀟灑風韻美如此之人豈常類信知顴骨有四般入耳無邊夀數寛插上天倉須兩府髪䰐之下當守土清奇古怪秀異端七者為身亦合論清而無神謂之寒奇而無神安有官古若無神謂之俗怪若無神乃主辱秀而無神謂之薄異若無神多削弱端而無神謂之麄七者有神為衆殊逺視之人心必逺視髙之人心必髙視平之人心必善下斜偷視主凶豪眼睛若露終凶死精神矍鑠亦徒勞須知眉平眼又平必然為道又為僧紫衣師號如何得伏犀骨肉頂中生眉眼多生神殺現縱為僧道不成名少年得第踏青雲眉目分明氣骨清眉目分明氣骨俗只有文章豈有名更有一般行尸肉須㸔肩髙與頭縮要知南人面似北身大而肥有水色欲知北體似南人體厚形小氣薄清南人似北終須富北人似南終享榮富人不過厚其形貴者當論骨與神貴在於眼富在耳貴人同富誤於人不貴似貴終須貴不貧似貧終須貧貧中得貴因何識㸔取驛馬先生骨富中反賤又何分胷髙骨寒神太昏借問相中何取夀認取聲名骨又秀若或氣短骨又露四十之前夀必故耳要白兮口要紅眉清目秀鼻如筒更兼六府相朝揖富貴一生到老終鼻梁深兮山根折少哭尊親并骨血弟兄無一眉麄短耳無輪廓主無兒更有一法須要識結喉露齒主妨妻大凡須㸔氣與色色浮皮外氣居皮皮外者色皮内者氣來時如蠒去牽絲去似馬尾將欲撒為福定隨日影去為灾直須終日聚不拘青黑與紅黄但認發之在何處若能依部以㸔之足知為善與為悲稱意之人何所識㸔取三光并五澤三光兩目上鼻金聳兩耳珠凖頭為澤印堂兩金併地閣若還諸事不如心其位自然皆暗黑形滯之人行步重神滯之人聲必硬色滯之人面塵埃飛禽走獸有數般莫將禽向獸中㸔瘦長但向禽中取肥短之人以獸觀似虎之人取其項似犀之人取其背鳳要眼長鶴身削似禽不嫌身瘦小似獸若肥最為要禽肥必定不能飛獸若瘦兮安能走吁嗟流俗不知因要知飛走取其形若入正形須大貴依稀相似出羣人日角龍文雖謂奇所謂不吉仍何為三尖五露不入相所為若善福相隨若不以心而論相是將人事逆天時若還人心相應相相逐心生信有之大凡微妙不難識要在心通與眼力但將此論細推之長短於中無不得人倫風鑑同成和子統論成和子曰予常内收視反聽一無所有縱觀萬物見富貴貧賤之不同未委其誰與之耶議者曰必造物與之也見吉凶夀夭之或異未委其誰與之耶議者曰必造物與之也如是則物為其所者固碌碌矣而造物者豈真聽之也求其端方其理是豈偶然哉其所以不同者皆出於自運自化故有造物者主之而已若夫於其一無所有則内焉與道同體外焉與造化者同功而造物者又焉能去之也且具形於天地之間為形相異生死榮辱循環無端玉管照神云不能見道所以出生入死如循環然故造物者得而主之也其間不失其本可以語道為貴人其庶幾焉如知所謂貴人者何求其故有自來也希夷子問成和子曰請言其來所自成和子曰其來有五有自修行中來者有神仙中來者有星辰中來者有神祗中來者有精靈中來者希夷子曰可以形相别乎成和子曰可形貌清古舉動恭謹性善氣平言極至理雖在朝廷常有山林之趣此修行中來者形貌灑落舉動風雅性惠氣和言涉方術雖在朝廷常有修煉之志此神仙中來者形貌顯赫舉動嚴肅性明氣直言涉造化雖在朝廷常有脱塵之意此星辰中來者形貌奇異舉動急速性靈氣剛言涉威猛雖在朝廷常有祭祀之敬此神祗中來者形貌醜怪舉動强惡性酷氣暴言涉浮邪雖在朝廷常有殺伐之心此精靈中來者五者之中神祗精靈以威武為貴者其性稍從善或增積善根亦可進乎道也夫人生在世固多般矣或為碌碌仕宦或為區區四民或進或退或得或失或多歡樂或多憂惱或初貧窮而終富貴或始富貴而終貧窮或始貴而終賤或始賤而終貴或富貴而夭或貧賤而夀或生於東南而旺於西北或生於西北而死於東南以至婚姻飲食交遊聚㑹不期而致如響答聲皆縁所作而受報未嘗有毫髪之差昧者由之而不知也希夷子問成和子曰可以形相分别使昧者可以避惡趨善是亦明之一端也成和子曰事有所行理有所言茍使人避惡而趨善當得隂報非惟凶咎自逺亦可以證來世之果報不深則形貌偏枯氣色雜碌骨雖起而不聳正面雖開而無肉故為碌碌仕宦或眉疎而眼秀氣稍清則為士或皮麄或肉重或氣混濁則為農為商骨巧而肉薄則為工或氣散而色沉故為四民進退得失之不常蓋因形相之不全骨氣渾厚精神閒暇者多歡樂骨氣清薄精神露見者多憂惱形神正而氣色不開者始貧而後富氣色嫩而形神不藏者始富而後貧五嶽相朝而未開五星分明而未出者始賤終貴五嶽磊落而俱走五星分明而跼促始貴而終賤部位峻急氣色嫩而面光故富貴而夭部位開伏氣色燥而深沉故貧賤而夀頥頷連地閣而龍宫門常有潤色生東南而必旺於西北神光散入邊地而山林常有潤色雖生西北必死東南亦有西北之人旺於東南東南之人死於西北其騐者山林邊地之氣色但由青黄黒白赤休囚衰旺而推之乃可見矣故婚姻之逺近貴賤就魚尾龍宫氣色㸔之食禄之逺近榮枯就官禄驛馬氣色㸔之大凡氣色紅黄者為吉黒白者凶發深則近發淺則逺氣色和則聚㑹交遊多喜氣色暴則交遊聚㑹多惡以至厯清要遭貶責受戮辱者若雖在眸子之瞭眊精神之秀媚未有不由用心之太過也希夷子曰至理之論不出於此竊見世人或以五行取形或以飛走取形未知孰是分三主九曜十二宫亦不可以見定說可得聞乎成和子曰人禀五行而生飲天之和食地之德未有不由乎五行因而取禀須識五行之性故能理其說而載於形以飛走取形則議物理自然之意如易之取象既以天地風雷水火山澤之八物以象八卦又以牛馬龍雞豕雉狗羊以配之其為物也㣲其取類也大以飛走取形亦如之其物之為貴者莫過虬龍鸞鳳龜鶴獅子狻猊之類有飛有蟠有病有懶其次則麟虎猿猴犀象牛馬凡此十類者之中均為物也自有不同故虬龍一類有飛有蟠有病有懶鸞鳳一類有翺有翔有孤有饑虬龍則巖巉而身長鸞鳳則端正而眼細虬則小龍則大鳳為雄兮鸞為雌骨格似而神氣不正則取其飛蟠病懶翺舞孤饑之勢以况之鶴則清瘦而脛長龜則清古而眼雛二者靈物其形相類不求貴達亦當得道獅子則昻藏狻猊則小於獅子也猿臂長面圓猴則面瘦而眼圓牛則行緩馬則驟而急其大畧如此然正形故難得也此特取可貴者而言以至麋鹿彪豹狐䑕鶴鴿雞犬猪羊鵝鴨之類凡有生有性者皆得可以取象非博物𤣥機之士能觸類而推之亦難知矣蓋取形又不須全似但以耳目口鼻行歩趨向得其髣髴皆是也嗚呼知人難於知天矣天有寒暑之可期人有傾危則在於反覆之間天有晦明之可見人有容貌則在於深厚之間天有旦暮之可數人則有朝秉權要暮為逐客朝處蒿萊而暮致青雲者實難知也惟用心若鑑之士則真偽不可逃也面有九曜鼻屬金眼屬木耳屬水口屬火面屬土左顴骨為羅右顴骨為計眉為紫炁人中屬月孛是也三主或自下而上為言者或自上而下為言者皆不足取以形之屬分可以無疑夫水生於天一金則生於地四金水形神者當自天庭至印堂為初主印堂至凖頭為中主凖頭至地閣為末主土者興中央之正色發於中宫如土形人自凖頭至印堂為初主印堂至天庭為中主凖頭至地閣為末主更有兼形則取其多為主又焉能逃此哉或曰面有十二宫印堂為命宫天倉地庫為財帛宫龍虎額角頭為兄弟宫日月角為父母宫三隂三陽為男女宫懸壁為奴僕宫魚尾為妻妾宫神光年夀為疾厄宫山林邊地為遷移宫正面為官禄宫精神地角福堂為福德宫相貌則總而言也取形之理分三主九曜十二宫之法無以易此希夷子曰人生天地之間不止於百千萬億數其立身以殊豈可遍言之也能廣此意以觀人知窮易象乃可得也何得一為喻成和子曰幽深微妙天之機也造化變移天之理也論天理以應人可也泄天之機以惑人天必罰之然而皇天無私惟徳是輔惟善人是為由是而觀則禍福無不自己求之者人有常言雖有窮困而通否極而泰居困之時不能致命遂志焉可求通居否之時不能修徳避難焉可求泰此易所謂貴乎藏器於身待時而動之君子也低視而心暗藏氣愚而色不和小人也已上與玉管照神論五種相法同
